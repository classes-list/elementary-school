  { id:'perimeter', title:'Solve Perimeter Problems', icon:'📏', cc:'3.MD.8', desc:'Find perimeters and side lengths of polygons; compare rectangles with same area or same perimeter.', ytSearch:'khan academy 3rd grade perimeter rectangles polygons' },
];

const LESSONS = {
  "mult-div-intro": "<h2>Understand Multiplication &amp; Division</h2><p><strong>Multiplication</strong> is a fast way to count equal groups. 4 rows × 3 stars = 12 stars.</p><p><strong>Division</strong> is either <em>sharing</em> or <em>grouping</em>.</p><ul><li>Sharing: 12 marbles ÷ 3 friends = 4 each.</li><li>Grouping: 12 marbles into groups of 3 = 4 groups.</li></ul><p><strong>Worked Example:</strong> 5 baskets, 6 apples each. Apples in all? 5 × 6 = <strong>30</strong>.</p><p><strong>Vocabulary:</strong> factor × factor = product; dividend ÷ divisor = quotient.</p>",
  "mult-patterns": "<h2>Multiplication Facts: Use Patterns</h2><p><strong>×2:</strong> double the number. 2 × 7 = 14.</p><p><strong>×5:</strong> ends in 0 or 5. 5 × 6 = 30.</p><p><strong>×10:</strong> add a zero. 10 × 8 = 80.</p><p><strong>×9 trick:</strong> multiply by 10, subtract the number. 9 × 7 = 70 − 7 = 63.</p><p><strong>Skip counting</strong> is the fastest way to build these facts: 3, 6, 9, 12, 15 (×3 table).</p>",
  "mult-properties": "<h2>Multiplication Facts for 3, 4, 6, 7, 8</h2><p>These facts are harder to memorize. Break them apart!</p><p><strong>Distributive property:</strong> 6 × 8 = (5 × 8) + (1 × 8) = 40 + 8 = 48.</p><p><strong>Associative:</strong> 8 × 7 = 8 × (2 × 3) + 8 = still 56. Or think of 8 × 7 = 8 × 5 + 8 × 2 = 40 + 16 = 56.</p><p><strong>Doubles trick:</strong> ×4 = double twice. 4 × 6 → 6 doubled = 12; doubled again = <strong>24</strong>.</p><p><strong>Worked:</strong> 7 × 8 = 7 × 4 × 2 = 28 × 2 = <strong>56</strong>.</p>",
  "division-facts": "<h2>Division Facts</h2><p>Every multiplication fact has a matching division fact.</p><p><strong>Fact family for 3, 5, 15:</strong> 3 × 5 = 15; 5 × 3 = 15; 15 ÷ 3 = 5; 15 ÷ 5 = 3.</p><p><strong>Worked:</strong> 42 ÷ 6 = ? Think: 6 × ? = 42. Answer: <strong>7</strong>.</p><p><strong>Special rules:</strong></p><ul><li>Any number ÷ 1 = itself.</li><li>Any number ÷ itself = 1.</li><li>0 ÷ any nonzero number = 0.</li><li>You cannot divide by 0.</li></ul>",
  "mult-div-fluent": "<h2>Fluently Multiply &amp; Divide within 100</h2><p>Fluent means fast AND accurate. Aim for automatic recall of every fact up to 10 × 10.</p><p><strong>Word problem strategy:</strong></p><ol><li>Read the problem twice.</li><li>Circle the numbers and the question.</li><li>Decide: multiply or divide?</li><li>Solve and check.</li></ol><p><strong>Worked:</strong> A store had 8 shelves. Each shelf held 7 books. Then 12 books were sold. How many books left?</p><p>Total: 8 × 7 = 56. Left: 56 − 12 = <strong>44 books</strong>.</p>",
  "area": "<h2>Connect Area to Multiplication</h2><p><strong>Area</strong> is the space inside a flat shape, measured in square units.</p><p><strong>Rectangle area = length × width.</strong> 5 × 3 = 15 square units.</p><p>You can also COUNT unit squares. A 5×3 rectangle has 5 rows of 3 squares = 15.</p><p><strong>Distributive property with area:</strong> A 6×8 rectangle can be split into 6×5 + 6×3 = 30 + 18 = 48 sq units.</p><p><strong>Real-life:</strong> How much carpet for a 12 ft × 10 ft room? Area = 12 × 10 = <strong>120 sq ft</strong>.</p>",
  "data": "<h2>Represent &amp; Interpret Data</h2><p><strong>Bar graph:</strong> bars show counts. Great for comparing categories (favorite pet, favorite fruit).</p><p><strong>Picture graph:</strong> each picture stands for a number, told by the KEY.</p><p><strong>Line plot:</strong> Xs above a number line show how often each value shows up.</p><p><strong>Read carefully:</strong> check the SCALE. On a bar graph, if the scale goes up by 2s, a bar to 8 means 8, not 4.</p><p><strong>Worked:</strong> Bar graph shows Cats 8, Dogs 12, Fish 4. How many pets total? 8 + 12 + 4 = <strong>24</strong>.</p>",
  "add-sub-strategies": "<h2>Strategies to Add &amp; Subtract</h2><p><strong>Rounding</strong> gives you a fast estimate.</p><p><strong>Nearest ten:</strong> look at the ones digit. 47 → 50; 42 → 40; 45 → 50 (round up on 5).</p><p><strong>Nearest hundred:</strong> look at the tens digit. 348 → 300; 375 → 400.</p><p><strong>Estimate first, then compute:</strong></p><p><strong>Worked:</strong> 287 + 156 ≈ 300 + 200 = 500. Exact: 287 + 156 = <strong>443</strong>. Estimate was off — recheck? 500 vs 443 → 300 was too high, should have used 290. Sharper estimate = 290 + 160 = 450 ≈ 443 ✓.</p>",
  "add-sub-fluent": "<h2>Fluently Add &amp; Subtract within 1,000</h2><p>Use the <strong>standard algorithm</strong>: line up place values, add or subtract each column, regroup when needed.</p><p><strong>Worked (addition):</strong> 347 + 285</p><pre>    3 4 7\n +  2 8 5\n --------\n    6 3 2</pre><p>Ones: 7 + 5 = 12; write 2, carry 1. Tens: 4 + 8 + 1 = 13; write 3, carry 1. Hundreds: 3 + 2 + 1 = 6.</p><p><strong>Worked (subtraction with regrouping):</strong> 503 − 248</p><p>Ones: can't do 3 − 8; borrow from tens (but tens is 0, so borrow from hundreds first). Rework: 503 = 4 hundreds + 9 tens + 13 ones. 13−8 = 5; 9−4 = 5; 4−2 = 2. Answer: <strong>255</strong>.</p>",
  "mult-tens": "<h2>Multiply by Multiples of 10</h2><p><strong>Pattern:</strong> multiplying by 10 adds a zero. Multiplying by 20 = (× 2) then (× 10) = double, then add a zero.</p><p><strong>Worked:</strong> 4 × 30. Think: 4 × 3 × 10 = 12 × 10 = <strong>120</strong>.</p><p><strong>Worked:</strong> 6 × 50 = 6 × 5 × 10 = 30 × 10 = <strong>300</strong>.</p><p><strong>Speed check:</strong> multiply the non-zero digits, then attach the zeros.</p><p>7 × 80: 7 × 8 = 56 → attach one 0 → <strong>560</strong>.</p>",
  "word-problems": "<h2>Word Problems with All 4 Operations</h2><p><strong>Two-step problems</strong> need TWO operations.</p><p><strong>Strategy:</strong></p><ol><li>What do we know?</li><li>What are we asked?</li><li>What is the FIRST step?</li><li>What is the SECOND step?</li><li>Check: does the answer make sense?</li></ol><p><strong>Worked:</strong> Maya has 4 boxes. Each holds 8 crayons. She gives 5 away. How many left?</p><p>Step 1: 4 × 8 = 32 crayons. Step 2: 32 − 5 = <strong>27 crayons</strong>.</p>",
  "fractions-intro": "<h2>Understand Fractions as Numbers</h2><p>A <strong>fraction</strong> shows part of a whole. The TOP (numerator) tells how many pieces you have; the BOTTOM (denominator) tells how many equal pieces make the whole.</p><p><strong>Example:</strong> 3/4 means \"3 of 4 equal pieces.\"</p><p><strong>Number line:</strong> a fraction is a place on the number line between 0 and 1 (or beyond).</p><p>To plot 2/5, divide the segment from 0 to 1 into 5 equal parts. The second tick mark is 2/5.</p><p><strong>Same numerator, different denominator:</strong> 1/2 &gt; 1/4 (bigger pieces).</p>",
  "fraction-equiv": "<h2>Fraction Equivalence &amp; Comparison</h2><p><strong>Equivalent fractions</strong> look different but are equal. 1/2 = 2/4 = 3/6 = 4/8.</p><p><strong>Rule:</strong> multiply top and bottom by the same number.</p><p><strong>Compare same denominator:</strong> bigger top wins. 5/8 &gt; 3/8.</p><p><strong>Compare same numerator:</strong> smaller bottom wins (bigger pieces). 3/4 &gt; 3/8.</p><p><strong>Use benchmarks:</strong> compare to 1/2 or 1 whole. 3/4 is greater than 1/2; 1/4 is less than 1/2.</p>",
  "time-mass-capacity": "<h2>Time, Capacity &amp; Mass</h2><p><strong>Telling time to the nearest minute:</strong> hour hand tells the hour; minute hand tells the minutes. Count minutes in 5s: 5, 10, 15, 20, ...</p><p><strong>Elapsed time:</strong> the amount of time between start and end. From 2:15 to 3:40 = 1 hour 25 minutes.</p><p><strong>Mass</strong> measures how heavy something is. Metric units: gram (g), kilogram (kg). 1 kg = 1,000 g.</p><p><strong>Capacity</strong> measures how much liquid a container holds. Metric units: milliliter (mL), liter (L). 1 L = 1,000 mL.</p><p><strong>Estimate reference:</strong> a paper clip ≈ 1 g; a book ≈ 1 kg; a spoon ≈ 5 mL; a soda bottle ≈ 500 mL.</p>",
  "shapes-2d": "<h2>Attributes of 2D Shapes</h2><p>A <strong>quadrilateral</strong> is any 4-sided polygon.</p><ul><li><strong>Square:</strong> 4 equal sides + 4 right angles.</li><li><strong>Rectangle:</strong> 4 right angles (opposite sides equal).</li><li><strong>Rhombus:</strong> 4 equal sides (may not have right angles).</li><li><strong>Parallelogram:</strong> 2 pairs of parallel sides.</li><li><strong>Trapezoid:</strong> 1 pair of parallel sides.</li></ul><p><strong>Partition:</strong> divide a shape into equal areas. A rectangle cut into 4 equal parts = each part is 1/4 of the whole.</p><p><strong>Worked:</strong> Which shape has 4 right angles but sides that AREN'T all equal? <strong>Rectangle</strong>.</p>",
  "perimeter": "<h2>Perimeter</h2><p><strong>Perimeter</strong> = the distance AROUND a shape. Add all the sides.</p><p><strong>Rectangle:</strong> P = 2(L + W). A 4×3 rectangle: P = 2(4+3) = 14 units.</p><p><strong>Square:</strong> P = 4 × side. A square with side 5: P = 20.</p><p><strong>Missing side:</strong> if you know the perimeter and some sides, subtract to find the missing one.</p><p><strong>Example:</strong> A triangle has sides 5, 7, and ?. Perimeter = 20. Missing side = 20 − 5 − 7 = <strong>8</strong>.</p><p><strong>Same area, different perimeter:</strong> a 1×6 rectangle and a 2×3 rectangle both have area 6, but perimeters 14 vs 10.</p>",
};

let currentUnit = null;

function resourceCardHTML(unit) {
  const phetBtn = unit.phetUrl ? `<a class="btn-phet" href="${unit.phetUrl}" target="_blank">🧪 PhET Simulation</a>` : '';
  const ytBtn = `<a class="btn-yt" href="https://www.youtube.com/results?search_query=${encodeURIComponent(unit.ytSearch)}" target="_blank">▶️ YouTube</a>`;
  const ixlBtn = unit.ixlUrl ? `<a class="btn-ixl" href="${unit.ixlUrl}" target="_blank" rel="noopener">📚 IXL Practice</a>` : '';
  return `<div class="resource-card"><h3>📚 Resources</h3><div class="resource-btns">${phetBtn}${ixlBtn}${ytBtn}</div></div>`;
}

function renderHome() {
  const grid = document.getElementById('units-grid');
  grid.innerHTML = '';
  UNITS.forEach(unit => {
    const card = document.createElement('div');
    card.className = 'unit-card';
    card.onclick = () => showLesson(unit.id);
    card.innerHTML = `
      <div class="unit-card-header">
        <div class="unit-card-icon">${unit.icon}</div>
        <div class="unit-card-meta">
          <div class="unit-card-title">${unit.title}${completedUnits[unit.id]?' ✅':''}</div>
          <div class="unit-card-cc">${unit.cc}</div>
        </div>
      </div>
      <div class="unit-card-desc">${unit.desc}</div>
      <div class="unit-card-pills">
        <div class="pill">📖 Lesson</div>
        <div class="pill">📋 Worksheet</div>
        <div class="pill">▶️ YouTube</div>
      </div>`;
    grid.appendChild(card);
  });
}

function renderSidebar() {
  const sidebar = document.getElementById('sidebar-content');
  sidebar.innerHTML = '';
  UNITS.forEach((unit, idx) => {
    const item = document.createElement('div');
    item.className = 'sidebar-item' + (currentUnit === unit.id ? ' active' : '');
    item.textContent = `${idx + 1}. ${unit.title}${completedUnits[unit.id]?' ✅':''}`;
    item.onclick = () => showLesson(unit.id);
    sidebar.appendChild(item);
  });
}

function setTopbar() {
  document.getElementById('topbar-title').textContent = currentUnit ? UNITS.find(u => u.id === currentUnit).title : 'Exploring the World with Math';
}

function showHome() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('home-screen').classList.add('active');
  currentUnit = null;
  renderHome();
  renderSidebar();
  setTopbar();
}

function showLesson(unitId) {
  currentUnit = unitId;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('lesson-screen').classList.add('active');
  const unit = UNITS.find(u => u.id === unitId);
  document.getElementById('lesson-content').innerHTML = LESSONS[unitId] + resourceCardHTML(unit);
  renderSidebar();
  setTopbar();
}

function showWorksheet() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('worksheet-screen').classList.add('active');
  const ws = WORKSHEETS[currentUnit];
  let html = '';
  ws.forEach((p, idx) => {
    html += `<div class="problem"><h4>Problem ${idx + 1}</h4><p>${p.q}</p><textarea id="ans-${idx}" placeholder="Your answer..."></textarea></div>`;
  });
  document.getElementById('worksheet-content').innerHTML = html;
}

function checkWorksheet() {
  const ws = WORKSHEETS[currentUnit];
  let html = '';
  ws.forEach((p, idx) => {
    const userAns = document.getElementById(`ans-${idx}`).value;
    html += `<div class="problem"><h4>Problem ${idx + 1}</h4><p>${p.q}</p><div class="answer-key"><strong>Answer:</strong> ${p.answer}</div><p><strong>Your answer:</strong> ${userAns || '(no answer)'}</p></div>`;
  });
  document.getElementById('worksheet-content').innerHTML = html;
}

function showQuiz() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('quiz-screen').classList.add('active');
  const quiz = QUIZZES[currentUnit];
  let html = `
    <div style="background:#f0f4ff;padding:14px;border-radius:8px;margin-bottom:15px;border-left:4px solid #1B3A8A;">
      <label style="display:block;font-weight:600;color:#1B3A8A;margin-bottom:6px;">Student Name:</label>
      <input type="text" id="student-name" placeholder="Type your full name"
        style="width:100%;padding:8px;border:1px solid #ccc;border-radius:4px;font-size:14px;" />
    </div>
  `;
  quiz.forEach((q, idx) => {
    html += `<div class="quiz-question"><h4>Question ${idx + 1}</h4><p>${q.q}</p>`;
    q.opts.forEach((opt, optIdx) => {
      html += `<label><input type="radio" name="q${idx}" value="${optIdx}"> ${opt}</label>`;
    });
    html += `</div>`;
  });
  document.getElementById('quiz-content').innerHTML = html;
}

// Quiz results stored at latest submission so email button can use them.
let lastQuizResults = null;

function submitQuiz() {
  const quiz = QUIZZES[currentUnit];
  const studentName = (document.getElementById('student-name')?.value || '').trim();
  let score = 0;
  const breakdown = [];
  quiz.forEach((q, idx) => {
    const selected = document.querySelector(`input[name="q${idx}"]:checked`);
    const selectedIdx = selected ? parseInt(selected.value) : -1;
    const isCorrect = selectedIdx === q.ans;
    if (isCorrect) score++;
    breakdown.push({
      n: idx + 1,
      question: q.q,
      studentAnswer: selectedIdx >= 0 ? q.opts[selectedIdx] : '(no answer)',
      correctAnswer: q.opts[q.ans],
      correct: isCorrect
    });
  });
  const percent = Math.round((score / quiz.length) * 100);
  completedUnits[currentUnit] = true;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('certificate-screen').classList.add('active');

  const unitObj = UNITS.find(u => u.id === currentUnit);
  const unitTitle = unitObj ? unitObj.title : currentUnit;

  lastQuizResults = { studentName, unitTitle, score, total: quiz.length, pct: percent, breakdown };

  const nameLine = studentName
    ? `<p><strong>Student:</strong> ${studentName}</p>`
    : `<p style="color:#b91c1c;"><em>Tip: type your name on the quiz screen before submitting so Mrs. Won knows who you are.</em></p>`;

  document.getElementById('cert-content').innerHTML = `
    <div style="padding: 20px;">
      ${nameLine}
      <p><strong>Unit:</strong> ${unitTitle}</p>
      <p style="font-size: 24px; margin: 20px 0;">Quiz Score: ${score}/${quiz.length} (${percent}%)</p>
      <p>${percent === 100 ? "Perfect! 🌟" : percent >= 67 ? "Nice work! Keep practicing." : "Good try! Review the lesson and try again."}</p>
      <div style="margin-top:18px;">
        <button class="btn" onclick="emailResults()" style="background:#1B3A8A;color:white;padding:10px 18px;font-size:14px;border:none;border-radius:6px;cursor:pointer;">
          📧 Submit Quiz to Mrs. Won
        </button>
      </div>
      <p style="margin-top:10px;font-size:12px;color:#666;">
        Tapping the button opens Gmail with the score and answers filled in. Just press Send.
      </p>
    </div>
  `;
  renderSidebar();
  updateProgress();
}

function emailResults() {
  if (!lastQuizResults) return;
  const r = lastQuizResults;
  const lines = [];
  lines.push(`Aloha Mrs. Won,`);
  lines.push(``);
  lines.push(`A 3rd-grade math quiz was just submitted.`);
  lines.push(``);
  lines.push(`Student: ${r.studentName || '(name not provided)'}`);
  lines.push(`Unit: ${r.unitTitle}`);
  lines.push(`Score: ${r.score} out of ${r.total} (${r.pct}%)`);
  lines.push(``);
  lines.push(`--- Detailed Answers ---`);
  r.breakdown.forEach(b => {
    lines.push(``);
    lines.push(`Q${b.n}. ${b.question}`);
    lines.push(`   Student's answer: ${b.studentAnswer}`);
    lines.push(`   Correct answer:   ${b.correctAnswer}`);
    lines.push(`   ${b.correct ? '✓ Correct' : '✗ Incorrect'}`);
  });
  lines.push(``);
  lines.push(`Mahalo,`);
  lines.push(`Mary, Star of the Sea School — Grade 3 Math`);

  const subject = `Grade 3 Math Quiz Result — ${r.studentName || 'Student'} — ${r.unitTitle} — ${r.pct}%`;
  const body = lines.join('\n');
  const to = 'ewon@starofthesea.org';

  const gmailUrl = `https://mail.google.com/mail/?view=cm&fs=1&tf=1`
    + `&to=${encodeURIComponent(to)}`
    + `&su=${encodeURIComponent(subject)}`
    + `&body=${encodeURIComponent(body)}`;
  window.open(gmailUrl, '_blank');
}

function updateProgress() {
  const completed = Object.keys(completedUnits).length;
  document.getElementById('progress-text').textContent = `${completed}/${UNITS.length}`;
}

function showHandout() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('handout-screen').classList.add('active');
  const h = HANDOUTS_5[currentUnit];
  if (!h) {
    document.getElementById('handout-content').innerHTML = '<p>No handout available for this unit.</p>';
    return;
  }
  const stepsHtml = h.steps.map(s => `<li>${s}</li>`).join('');
  const reflectHtml = h.reflect.map((r,i) => `<li>${r}</li>`).join('');
  const akFile = ANSWER_KEYS_5[currentUnit];
  const answerKeyHtml = akFile ? `
      <div style="background:#E8F5E9;border:2px solid #2E7D32;border-radius:8px;padding:14px;margin:14px 0;">
        <strong style="color:#1B3A8A;">📗 Answer Key (for self-check):</strong>
        <a href="answerkeys/${akFile}" download style="display:inline-block;background:#2E7D32;color:#fff;padding:8px 16px;border-radius:6px;text-decoration:none;font-weight:600;margin:6px 8px 6px 0;">Download ${akFile}</a>
        <div style="font-size:0.9rem;color:#555;margin-top:6px;">Completed workbook with all formulas, charts, and real-world data. Open in Excel or upload to Google Sheets (<em>File → Import → Upload</em>) to compare with your own work after you finish.</div>
      </div>` : '';
  document.getElementById('handout-content').innerHTML = `
    <div class="handout-card">
      <h3>${h.title}</h3>
      <div class="handout-science">${h.science}</div>
      <div class="handout-mission">${h.mission}</div>
      <p><strong>📋 Step-by-Step Instructions</strong></p>
      <ol class="handout-steps">${stepsHtml}</ol>
      <div class="handout-deliverable">
        <strong>🎯 What to Submit:</strong>
        ${h.deliverable}
      </div>
      ${answerKeyHtml}
      <div class="handout-reflect">
        <strong>💭 Reflection Questions:</strong>
        <ol>${reflectHtml}</ol>
      </div>
    </div>`;
}
