  <script>
let completedUnits = {};
const UNITS = [
  { id:'life-cycles', title:"Life Cycles: Equal Groups", icon:'🦋', cc:'3-LS1 + 3.OA.1-3', desc:'Butterflies lay eggs in clusters, chickens in nests. Count equal groups — that IS multiplication.', ytSearch:'3rd grade multiplication equal groups life cycle' },
  { id:'ecosystems', title:"Ecosystems: Multiplication Arrays", icon:'🌳', cc:'3-LS2 + 3.OA.5', desc:'Bird flocks, bee hives, ant colonies form arrays. Break big groups apart with the distributive property.', ytSearch:'3rd grade multiplication arrays distributive property' },
  { id:'adaptations', title:"Adaptations: Division & Sharing", icon:'🐢', cc:'3-LS4 + 3.OA.6-7', desc:'Animal parents share food equally. Division is unknown-factor multiplication.', ytSearch:'3rd grade division facts fact families' },
  { id:'habitats', title:"Habitats: Area", icon:'🏞️', cc:'3-LS4 + 3.MD.5-7', desc:'Design rectangular animal enclosures. Area = length × width — same as multiplication.', ytSearch:'3rd grade area rectangles habitats' },
  { id:'weather-detectives', title:"Weather Detectives: Data & Graphs", icon:'🌦️', cc:'3-ESS2 + 3.MD.3-4', desc:'Record daily temperature and rainfall. Draw bar graphs and line plots.', ytSearch:'3rd grade weather bar graphs data' },
  { id:'forces-motion', title:"Forces & Motion: Add & Subtract", icon:'⚙️', cc:'3-PS2 + 3.NBT.2', desc:'Measure how far cars roll. Use place-value strategies to add and subtract distances.', ytSearch:'3rd grade add subtract strategies measurement' },
  { id:'natural-hazards', title:"Natural Hazards: Add/Sub within 1,000", icon:'⚡', cc:'3-ESS3 + 3.NBT.1-2', desc:'Storms give big numbers. Round, then add and subtract fluently within 1,000.', ytSearch:'3rd grade fluent addition subtraction 1000' },
  { id:'fossils', title:"Fossils: Multiply by Tens", icon:'🦕', cc:'3-LS4 + 3.NBT.3', desc:'Dinosaurs lived tens of millions of years ago. Multiply by 10, 100, and 1,000.', ytSearch:'3rd grade multiply by tens hundreds' },
  { id:'heredity', title:"Heredity: Fractions Intro", icon:'👨‍👩‍👧', cc:'3-LS3 + 3.NF.1', desc:'Survey the class. Write traits as fractions: numerator over denominator.', ytSearch:'3rd grade fractions of a group' },
  { id:'plants-grow', title:"Plants Grow: Fraction Equivalence", icon:'🌱', cc:'3-LS1 + 3.NF.3', desc:'Measure plants and show 1/2 = 2/4 = 4/8. Same amount, different form.', ytSearch:'3rd grade equivalent fractions plants' },
  { id:'water-cycle', title:"Water Cycle: Capacity & Time", icon:'💧', cc:'3-ESS2 + 3.MD.1-2', desc:'Measure rain in mL and L. Track the time water takes to evaporate.', ytSearch:'3rd grade capacity milliliters liters' },
  { id:'rocks-shapes', title:"Rocks: 2D Shapes & Perimeter", icon:'💎', cc:'3-ESS2 + 3.G.1 + 3.MD.8', desc:'Classify crystal shapes as quadrilaterals. Compute perimeters of rock outlines.', ytSearch:'3rd grade shapes perimeter geometry' },
];

const LESSONS = {
  "weather-detectives": "<h2>🌦️ Weather Detectives</h2><h3>The Science</h3><p>Weather changes every day, but over weeks and months you can see PATTERNS. Weather scientists (meteorologists) track daily temperature, rainfall, wind, and clouds to predict what's coming.</p><h3>The Math Skill: Bar Graphs &amp; Line Plots</h3><p>Every scientist turns numbers into pictures. A BAR GRAPH shows how tall each day's temperature is. A LINE PLOT shows how often each rainfall amount happens.</p><p><strong>Example:</strong> Daily high temperatures: Mon 72°, Tue 75°, Wed 78°, Thu 70°, Fri 68°.</p><p>Draw 5 bars. Which is tallest? Which is shortest? What is the range (highest − lowest)? 78 − 68 = <strong>10°</strong>.</p><h3>Try This</h3><p>For 5 days, record the outdoor temperature at 9am. Round each to the nearest 5°. Draw a bar graph. Circle the hottest day.</p><h3>Vocabulary</h3><ul><li><strong>Temperature</strong> — how hot or cold the air is</li><li><strong>Precipitation</strong> — rain, snow, hail</li><li><strong>Range</strong> — biggest number minus smallest</li><li><strong>Bar graph</strong> — bars show category counts</li></ul>",
  "life-cycles": "<h2>🦋 Life Cycles &amp; Multiplication</h2><h3>The Science</h3><p>Every animal has a life cycle. A butterfly goes: egg → caterpillar → chrysalis → adult. A frog: egg → tadpole → froglet → adult. A chicken: egg → chick → adult.</p><h3>The Math Skill: Multiplication as Equal Groups</h3><p>Animals lay eggs in equal groups! A butterfly lays 5 clusters of 8 eggs each. Total = 5 × 8 = <strong>40 eggs</strong>.</p><p>Multiplication is a fast way to count equal groups.</p><p><strong>Example:</strong> A frog lays 4 clusters of 6 eggs. Total = 4 × 6 = <strong>24 eggs</strong>. If only ½ hatch, that's 12 tadpoles.</p><h3>Try This</h3><p>Pretend you're a butterfly. Draw 4 groups of 5 eggs. Circle each group. Count by 5s: 5, 10, 15, 20. That's the same as 4 × 5 = 20.</p><h3>Vocabulary</h3><ul><li><strong>Life cycle</strong> — the stages an animal goes through</li><li><strong>Equal groups</strong> — groups of the same size</li><li><strong>Product</strong> — the answer to a multiplication problem</li></ul>",
  "plants-grow": "<h2>🌱 Plants Grow: Measure &amp; Fractions</h2><h3>The Science</h3><p>Plants have parts: roots, stem, leaves, flowers. Each part has a job. Plants need sunlight, water, and soil to grow.</p><h3>The Math Skill: Measurement &amp; Fractions</h3><p>Measure plants with a ruler (cm). Track growth week by week. Show parts as fractions of the whole plant.</p><p><strong>Example:</strong> A plant is 12 cm tall. Roots take up 3 cm. Fraction of plant that's roots = 3/12 = <strong>1/4</strong>.</p><p>Week 1: 5 cm. Week 2: 8 cm. Growth = 8 − 5 = 3 cm.</p><h3>Try This</h3><p>Grow a bean plant. Measure it every week for 4 weeks. Make a bar graph of its heights. Draw the plant divided into 4 equal sections showing roots (1/4), stem (1/4), leaves (1/4), flower (1/4).</p><h3>Vocabulary</h3><ul><li><strong>Roots, stem, leaves, flower</strong> — parts of a plant</li><li><strong>Centimeter (cm)</strong> — a unit for measuring length</li><li><strong>Fraction</strong> — part of a whole</li></ul>",
  "forces-motion": "<h2>⚙️ Forces &amp; Motion Lab</h2><h3>The Science</h3><p>A FORCE is a push or a pull. Forces make things move, stop, or change direction. Magnets pull metal without touching. Friction slows things down.</p><h3>The Math Skill: Measurement &amp; Comparison</h3><p>Measure how far a toy car rolls. Compare two ramps to see which is faster.</p><p><strong>Example:</strong> Car A rolls 45 cm on wood; Car B rolls 78 cm on plastic. Difference: 78 − 45 = <strong>33 cm</strong>. Plastic has less friction.</p><h3>Try This</h3><p>Roll a toy car down a ramp made of cardboard, then a ramp made of a smooth book. Measure each roll with a ruler. Which surface let the car roll farther? Why?</p><h3>Vocabulary</h3><ul><li><strong>Force</strong> — a push or pull</li><li><strong>Friction</strong> — slows down moving objects</li><li><strong>Magnet</strong> — pulls certain metals</li><li><strong>Distance</strong> — how far something travels</li></ul>",
  "ecosystems": "<h2>🌳 Ecosystems: Grouping &amp; Division</h2><h3>The Science</h3><p>An ECOSYSTEM is all the living and non-living things in one place — plants, animals, water, soil, air. A FOOD CHAIN shows who eats whom: grass → grasshopper → frog → snake → hawk.</p><h3>The Math Skill: Multiplication &amp; Division</h3><p>Every level of the food chain needs 10 times as much energy as the level above it.</p><p><strong>Example:</strong> A robin brings 24 worms to 4 baby chicks. Each chick gets 24 ÷ 4 = <strong>6 worms</strong>.</p><p><strong>Predator-prey:</strong> 1 hawk needs 8 mice to survive. If 5 hawks live in a forest, they need 5 × 8 = 40 mice per month.</p><h3>Try This</h3><p>Draw a food chain with 4 levels. Label who eats whom. Then compute: if a fox eats 12 rabbits per year and there are 5 foxes, how many rabbits total? (12 × 5 = 60)</p><h3>Vocabulary</h3><ul><li><strong>Ecosystem</strong> — a community of living things and their environment</li><li><strong>Food chain</strong> — who eats whom</li><li><strong>Predator/prey</strong> — hunter/hunted</li></ul>",
  "habitats": "<h2>🏞️ Habitat Design</h2><h3>The Science</h3><p>A HABITAT is the natural home of an animal. Different animals need different habitats: fish live in water, rabbits in fields, bats in caves. Habitat size matters — big animals need more space.</p><h3>The Math Skill: Area &amp; Perimeter</h3><p>Area = space inside a shape. Perimeter = distance around it.</p><p><strong>Example:</strong> A rabbit pen is 5 ft × 4 ft. Area = 5 × 4 = 20 sq ft. Perimeter = 2(5+4) = <strong>18 ft of fencing</strong>.</p><h3>Try This</h3><p>Design a habitat for a chosen animal. Draw its enclosure (rectangle) on grid paper. Compute area and perimeter. Decide how many food dishes fit (each takes 1 sq ft).</p><h3>Vocabulary</h3><ul><li><strong>Habitat</strong> — an animal's natural home</li><li><strong>Area</strong> — space inside (sq ft, sq m)</li><li><strong>Perimeter</strong> — distance around (ft, m)</li></ul>",
  "heredity": "<h2>👨‍👩‍👧 Heredity &amp; Traits</h2><h3>The Science</h3><p>TRAITS are features you inherit from parents (eye color, hair color, ear shape). Other traits you learn (riding a bike, speaking a language). Every trait comes from GENES.</p><h3>The Math Skill: Fractions</h3><p>Survey your class. How many students have brown eyes? Blue? Green? Show as a fraction of the whole class.</p><p><strong>Example:</strong> 20 students in a class: 12 have brown eyes, 5 have blue, 3 have green. Fractions: 12/20 = 3/5 brown; 5/20 = 1/4 blue; 3/20 green.</p><h3>Try This</h3><p>Survey 10 friends for a trait (attached earlobes, dimples, freckles). Write each count as a fraction of 10. Which trait is most common?</p><h3>Vocabulary</h3><ul><li><strong>Trait</strong> — a feature of a living thing</li><li><strong>Inherited</strong> — passed from parents</li><li><strong>Fraction</strong> — part / whole</li></ul>",
  "fossils": "<h2>🦕 Fossils &amp; Big Numbers</h2><h3>The Science</h3><p>A FOSSIL is what's left of a plant or animal that lived long ago. Dinosaurs lived about 65 million years ago. Fossils tell us how life on Earth has changed.</p><h3>The Math Skill: Round &amp; Compare Large Numbers</h3><p>Scientists round huge numbers to make them easier to talk about.</p><p><strong>Example:</strong> Tyrannosaurus rex lived 68 million years ago. Rounded to nearest 10 million: <strong>70 million</strong>. That's older than Triceratops (66 mya).</p><p>Which is more: 65,000,000 or 100,000,000? Compare the leading digits.</p><h3>Try This</h3><p>Make a dinosaur timeline. Round each age to the nearest 10 million. Order them from oldest to youngest.</p><h3>Vocabulary</h3><ul><li><strong>Fossil</strong> — preserved remains of ancient life</li><li><strong>Million</strong> — 1,000,000</li><li><strong>Round</strong> — replace with a friendlier close number</li></ul>",
  "adaptations": "<h2>🐢 Adaptations &amp; Populations</h2><h3>The Science</h3><p>An ADAPTATION is a body part or behavior that helps an animal survive. A turtle's shell protects it. A cheetah's speed helps it hunt. A camel's hump stores fat.</p><h3>The Math Skill: Multi-Step Word Problems</h3><p>Real science asks multi-step questions.</p><p><strong>Example:</strong> A meadow has 8 rows of 6 rabbits. A hawk eats 5 rabbits. How many left? (8 × 6 = 48; 48 − 5 = <strong>43 rabbits</strong>.)</p><h3>Try This</h3><p>Pick an animal. Research one adaptation. Then invent a math problem: \"A population of 6 penguins per iceberg × 4 icebergs = 24 penguins. If 8 travel south, ___ remain.\"</p><h3>Vocabulary</h3><ul><li><strong>Adaptation</strong> — a trait that helps survival</li><li><strong>Population</strong> — total number of one species in an area</li><li><strong>Multi-step</strong> — a problem with more than one operation</li></ul>",
  "water-cycle": "<h2>💧 Water Cycle &amp; Capacity</h2><h3>The Science</h3><p>Water moves around the Earth: EVAPORATION (liquid → gas), CONDENSATION (gas → droplets in clouds), PRECIPITATION (rain, snow), COLLECTION (rivers, oceans).</p><h3>The Math Skill: Capacity (mL and L)</h3><p>Water is measured by how much space it takes up. 1 liter (L) = 1,000 milliliters (mL). A juice box is about 200 mL; a soda bottle 500 mL; a milk jug 4 L.</p><p><strong>Example:</strong> A rain gauge collects 250 mL Mon, 150 mL Tue, 400 mL Wed. Total = 800 mL. Convert to liters: 800 mL = <strong>0.8 L</strong>.</p><h3>Try This</h3><p>Set up 3 rain gauges in different spots (open field, under a tree, near a wall). Compare total collected over a week. Draw the water cycle showing what happens to that rain.</p><h3>Vocabulary</h3><ul><li><strong>Evaporation, condensation, precipitation</strong> — water cycle stages</li><li><strong>Milliliter (mL), Liter (L)</strong> — capacity units</li><li><strong>1 L = 1,000 mL</strong></li></ul>",
  "natural-hazards": "<h2>⚡ Natural Hazards &amp; Estimation</h2><h3>The Science</h3><p>Natural HAZARDS are dangerous events from nature: hurricanes, tornadoes, earthquakes, floods, wildfires. Scientists estimate how big each event is to warn people.</p><h3>The Math Skill: Estimation &amp; Rounding</h3><p>Hurricane winds can reach 150 mph. Rounded to the nearest 10: 150 mph. To the nearest 100: 200 mph. Meteorologists ROUND to communicate quickly.</p><p><strong>Example:</strong> An earthquake registers 4.2 on the Richter scale; another is 5.8. Which is bigger? 5.8. Difference: 5.8 − 4.2 = 1.6 points. Each point is 10× stronger.</p><h3>Try This</h3><p>Look up 3 hurricanes from history. Round each wind speed to the nearest 10 mph. Rank them strongest to weakest. Make a safety plan for your family (3 things to do).</p><h3>Vocabulary</h3><ul><li><strong>Natural hazard</strong> — dangerous natural event</li><li><strong>Round</strong> — replace with a friendly nearby number</li><li><strong>Estimate</strong> — a smart guess</li></ul>",
  "rocks-shapes": "<h2>💎 Rocks, Crystals &amp; 2D Shapes</h2><h3>The Science</h3><p>Three main rock types: IGNEOUS (from lava), SEDIMENTARY (from layered sand), METAMORPHIC (changed by heat &amp; pressure). Crystals grow in geometric shapes — salt is CUBE-shaped; quartz is HEXAGONAL.</p><h3>The Math Skill: Classify 2D Shapes</h3><p>Every shape has attributes: number of sides, right angles, parallel sides.</p><p><strong>Quadrilaterals:</strong> square (4 equal sides + 4 right angles), rectangle (4 right angles), rhombus (4 equal sides), trapezoid (1 pair parallel sides), parallelogram (2 pairs parallel sides).</p><h3>Try This</h3><p>Look at 5 rocks or crystals. Trace the outline of each on paper. Which are quadrilaterals? Which have right angles? Which have equal sides?</p><h3>Vocabulary</h3><ul><li><strong>Igneous, sedimentary, metamorphic</strong> — rock types</li><li><strong>Crystal</strong> — solid with a geometric shape</li><li><strong>Quadrilateral</strong> — 4-sided shape</li></ul>",
};

const SCIENCE_CONNECTIONS = {
  "weather-detectives": "<h2>📐 Math Focus: Data &amp; Graphs</h2><p><em>Common Core:</em> 3.MD.3, 3.MD.4 &mdash; Scaled bar &amp; picture graphs; line plots.</p><h3>Topic 1 — Reading a Bar Graph</h3><p>A <strong>bar graph</strong> uses bars of different heights to compare CATEGORIES (e.g., 5 days of the week).</p><p><strong>Parts of a bar graph:</strong> title, x-axis labels (days), y-axis with scale (numbers), bars.</p><p><strong>Example:</strong> Monday's bar reaches 72. Reading rules: look at the top of the bar, trace left to the y-axis, read the number.</p><h3>Topic 2 — Drawing a Bar Graph</h3><ol><li>Draw an L-shape (x and y axis) on grid paper.</li><li>Label the y-axis with numbers (choose a SCALE — 5s, 10s).</li><li>Label the x-axis with each category.</li><li>Draw each bar to the correct height.</li><li>Give the graph a title.</li></ol><p><strong>Scale tip:</strong> If the biggest value is 78, count by 10s (0, 10, 20, ..., 80) so the graph fits nicely.</p><h3>Topic 3 — Line Plots</h3><p>A <strong>line plot</strong> uses X marks above a number line to show HOW OFTEN each value happens.</p><p><strong>Example:</strong> Daily rainfall in mm over 10 days: 0, 0, 3, 5, 5, 8, 8, 8, 12, 15. Mark an X above each value on the number line 0–15.</p><p><strong>Read it:</strong> The value with the tallest stack of X's is the MODE (most common).</p><h3>Topic 4 — Range &amp; Averages</h3><p><strong>Range</strong> = highest number − lowest number.</p><p><strong>Example:</strong> Temps 68°, 72°, 75°, 78°, 70°. Highest = 78°, lowest = 68°. Range = 78 − 68 = <strong>10°</strong>.</p><p><strong>Average (mean)</strong> = add up all values, divide by how many. (68+72+75+78+70) ÷ 5 = 363 ÷ 5 ≈ 72.6°.</p><h3>Try It Together</h3><p>These daily highs: 60°, 65°, 68°, 72°, 60°, 58°, 61°.</p><ol><li>What is the range?</li><li>What is the mode?</li><li>Draw a bar graph with scale of 5s.</li></ol><p><em>Answers: Range = 72 − 58 = 14°. Mode = 60°. Bar for Thursday tallest at 72.</em></p>",
  "life-cycles": "<h2>📐 Math Focus: Multiplication</h2><p><em>Common Core:</em> 3.OA.1, 3.OA.3, 3.OA.5, 3.OA.7 &mdash; Multiplication as equal groups.</p><h3>Topic 1 — What Multiplication Really Means</h3><p>Multiplication is FAST ADDITION of equal groups.</p><p>4 × 6 means \"4 groups of 6\" or \"4 rows of 6.\" Instead of adding 6 + 6 + 6 + 6, we say 4 × 6 = 24.</p><p><strong>The two numbers are called FACTORS.</strong> The answer is the <strong>PRODUCT</strong>.</p><h3>Topic 2 — Skip Counting</h3><p>Multiplication facts are the same as skip counting.</p><ul><li>Count by 2s: 2, 4, 6, 8, 10 → that's 5 × 2 = 10.</li><li>Count by 5s: 5, 10, 15, 20, 25 → 5 × 5 = 25.</li><li>Count by 6s: 6, 12, 18, 24 → 4 × 6 = 24.</li></ul><h3>Topic 3 — Arrays: A Visual Way</h3><p>An <strong>array</strong> is a rectangle of dots arranged in rows and columns.</p><p>3 rows × 5 columns = 15 dots. That's 3 × 5 = 15.</p><p><strong>Turn it around:</strong> The same array is 5 × 3 = 15 (commutative property). Rotating doesn't change the total.</p><h3>Topic 4 — Multiplication Facts to Memorize</h3><p>Focus on these fact families this year: ×0, ×1, ×2, ×5, ×10, then ×3, ×4, ×6, ×9. Save ×7 and ×8 for last.</p><p><strong>Tricks:</strong></p><ul><li><strong>×0 rule:</strong> any number × 0 = 0.</li><li><strong>×1 rule:</strong> any number × 1 = itself.</li><li><strong>×10 trick:</strong> just add a 0 (7 × 10 = 70).</li><li><strong>×9 finger trick:</strong> hold up 10 fingers. To find 9 × 4, fold down the 4th finger. Answer: 3 fingers left, 6 fingers right = 36.</li></ul><h3>Topic 5 — Word Problems</h3><p><strong>Example:</strong> A butterfly lays 4 clusters of 8 eggs. How many eggs? (4 × 8 = <strong>32 eggs</strong>.)</p><p><strong>Try:</strong> A frog lays 6 clusters of 9 eggs. How many? (6 × 9 = 54.)</p><p><strong>Try:</strong> 5 nests × 3 baby birds each = ? (15 baby birds.)</p>",
  "plants-grow": "<h2>📐 Math Focus: Measurement &amp; Fractions</h2><p><em>Common Core:</em> 3.MD.4, 3.NF.1, 3.NF.2 &mdash; Measure to nearest unit; unit fractions.</p><h3>Topic 1 — Measuring with a Ruler</h3><p>A ruler has marks for centimeters (cm) and often smaller marks for millimeters (mm).</p><p><strong>Rules:</strong> Line up the LEFT edge of the object with ZERO (not with the end of the ruler). Read the number where the RIGHT edge lands.</p><p><strong>Practice:</strong> A pencil is between 12 and 13 cm. Round to the nearest cm.</p><h3>Topic 2 — Recording Growth Over Time</h3><p>Measure the same plant every week for 4 weeks.</p><table style='border-collapse:collapse;'><tr><th style='border:1px solid #999;padding:6px;'>Week</th><th style='border:1px solid #999;padding:6px;'>Height (cm)</th></tr><tr><td style='border:1px solid #999;padding:6px;'>1</td><td style='border:1px solid #999;padding:6px;'>5</td></tr><tr><td style='border:1px solid #999;padding:6px;'>2</td><td style='border:1px solid #999;padding:6px;'>8</td></tr><tr><td style='border:1px solid #999;padding:6px;'>3</td><td style='border:1px solid #999;padding:6px;'>12</td></tr><tr><td style='border:1px solid #999;padding:6px;'>4</td><td style='border:1px solid #999;padding:6px;'>17</td></tr></table><p><strong>Total growth:</strong> Week 4 − Week 1 = 17 − 5 = <strong>12 cm</strong>.</p><p><strong>Weekly growth:</strong> Week 3 to Week 4 = 17 − 12 = 5 cm.</p><h3>Topic 3 — What is a Fraction?</h3><p>A <strong>fraction</strong> is a part of a whole.</p><p>Written as <strong>numerator/denominator</strong>. The <strong>denominator</strong> tells how many EQUAL parts the whole is cut into. The <strong>numerator</strong> tells how many parts we have.</p><p><strong>Example:</strong> A plant has 4 equal sections. Roots take up 1. Fraction of plant that is roots = <strong>1/4</strong>.</p><h3>Topic 4 — Unit Fractions on a Number Line</h3><p>Divide a line from 0 to 1 into 4 equal parts. Each tick mark: 1/4, 2/4, 3/4, 4/4 (= 1).</p><p><strong>Practice:</strong> Where is 3/4? At the third tick.</p><h3>Topic 5 — Fractions of a Group</h3><p>10 seeds; 3 sprout. Fraction that sprouted = 3/10.</p><p>20 leaves; 5 fell. Fraction fallen = 5/20 = 1/4.</p>",
  "forces-motion": "<h2>📐 Math Focus: Measurement &amp; Subtraction</h2><p><em>Common Core:</em> 3.MD.4, 3.NBT.2 &mdash; Measure; subtract within 1,000.</p><h3>Topic 1 — Measuring Distance</h3><p>Distance is how far something travels. Measure with a ruler, tape measure, or meterstick.</p><p><strong>Units:</strong> centimeters (cm), meters (m), or feet (ft).</p><p>1 m = 100 cm. 1 ft = 12 in.</p><h3>Topic 2 — Comparing Distances (Subtraction)</h3><p>To find how much FARTHER one distance is than another, SUBTRACT.</p><p><strong>Example:</strong> Car A rolls 76 cm. Car B rolls 45 cm. Difference = 76 − 45 = <strong>31 cm</strong>.</p><p><strong>Subtraction with regrouping:</strong> 76 − 45 → 6 − 5 = 1 in the ones; 7 − 4 = 3 in the tens. Answer: 31.</p><h3>Topic 3 — Averaging Multiple Rolls</h3><p>Scientists NEVER trust one measurement — they take several.</p><p><strong>Example:</strong> Roll 1 = 42 cm, Roll 2 = 45 cm, Roll 3 = 39 cm. Average = (42+45+39) ÷ 3 = 126 ÷ 3 = <strong>42 cm</strong>.</p><h3>Topic 4 — Estimation</h3><p>Before measuring, GUESS. Then check. Practice makes your guesses better.</p><p><strong>Reference sizes:</strong> a fingernail ≈ 1 cm, a doorknob ≈ 1 m off the floor.</p><h3>Try It Together</h3><p>A toy car rolls 82 cm, then 68 cm, then 74 cm on 3 tries.</p><ol><li>Sum: 82 + 68 + 74 = 224 cm.</li><li>Average: 224 ÷ 3 ≈ 75 cm.</li><li>Difference between longest and shortest: 82 − 68 = 14 cm.</li></ol>",
  "ecosystems": "<h2>📐 Math Focus: Multiplication Properties &amp; Arrays</h2><p><em>Common Core:</em> 3.OA.5 &mdash; Apply properties of operations (commutative, associative, distributive).</p><h3>Topic 1 — Arrays in Nature</h3><p>An <strong>array</strong> is a rectangle of objects in rows and columns. Bees build honeycomb arrays. Ants march in ordered rows. Fish schools swim in arrays.</p><p><strong>Example:</strong> A beehive with 6 rows of 8 workers each = 6 × 8 = <strong>48 workers</strong>.</p><h3>Topic 2 — Commutative Property (Rows ↔ Columns)</h3><p>Turn any array 90° and the total stays the same.</p><p>6 × 8 = 48. Turned: 8 × 6 = 48. That's the <strong>commutative property</strong>: order doesn't matter.</p><p><strong>Why it helps:</strong> If you know 6 × 8, you also know 8 × 6.</p><h3>Topic 3 — Distributive Property (Break Apart)</h3><p>Break big facts into easier pieces. 8 × 7 feels hard, but 8 × 5 (=40) + 8 × 2 (=16) is easy → 40 + 16 = 56.</p><p><strong>Formula:</strong> 8 × 7 = 8 × (5 + 2) = (8 × 5) + (8 × 2).</p><p><strong>Nature example:</strong> A pod of 8 dolphins hunts 7 fish each. Split: 5 fish now + 2 later. Total still 56.</p><h3>Topic 4 — Associative Property (Group Any Way)</h3><p>3 × 4 × 2 can be computed as (3 × 4) × 2 = 12 × 2 = 24, OR 3 × (4 × 2) = 3 × 8 = 24. Same answer.</p><h3>Topic 5 — Zero &amp; Identity</h3><ul><li><strong>Zero property:</strong> anything × 0 = 0. (A dead colony has 0 workers.)</li><li><strong>Identity property:</strong> anything × 1 = itself. (A single-tree flock of 12 birds = 12.)</li></ul><h3>Try It Together</h3><p>An ant colony has 9 rows of 6 workers.</p><ol><li>Total: 9 × 6 = 54.</li><li>Rewrite using commutative: 6 × 9 = 54.</li><li>Break apart 9 × 6 = (5 × 6) + (4 × 6) = 30 + 24 = 54.</li></ol>",
  "habitats": "<h2>📐 Math Focus: Area</h2><p><em>Common Core:</em> 3.MD.5, 3.MD.6, 3.MD.7 &mdash; Understand area; relate area to multiplication.</p><h3>Topic 1 — What is Area?</h3><p>Area = the amount of SPACE INSIDE a shape.</p><p>We measure area in <strong>square units</strong> — square inches, square feet, square meters — because it takes little squares to fill up the inside.</p><h3>Topic 2 — Area by Counting Squares</h3><p>Cover a rectangle with 1-ft-by-1-ft tiles. Count them. That count IS the area.</p><p>A 5 ft × 3 ft rectangle takes 15 tiles → area = <strong>15 square feet</strong>.</p><h3>Topic 3 — Area by Multiplication</h3><p>Counting one-by-one is slow. Multiply instead: <strong>Area = length × width</strong>.</p><p>5 × 3 = 15 sq ft. Same answer, faster.</p><p><strong>Why it works:</strong> Each ROW of the rectangle has 5 tiles. There are 3 rows. 3 × 5 = 15 tiles.</p><h3>Topic 4 — Distributive Property with Area</h3><p>An L-shaped habitat can be split into two rectangles. Compute each area, then add.</p><p><strong>Example:</strong> A 6 × 4 pen plus a 3 × 2 attached run = 24 + 6 = 30 sq ft.</p><h3>Topic 5 — Missing-Side Area Problems</h3><p><strong>Given:</strong> Area = 24 sq ft and length = 6 ft. Width = 24 ÷ 6 = <strong>4 ft</strong>.</p><p>This works because area = length × width, so width = area ÷ length.</p><h3>Try It Together</h3><p>A rectangular rabbit pen is 7 ft long and 5 ft wide.</p><ol><li>Area (floor space) = 7 × 5 = <strong>35 sq ft</strong>.</li><li>How many 1-ft square tiles cover the floor? 35.</li><li>If a lion needs 200 sq ft, will a 15 × 12 enclosure fit? 15 × 12 = 180. NO — too small.</li></ol>",
  "heredity": "<h2>📐 Math Focus: Fractions</h2><p><em>Common Core:</em> 3.NF.1, 3.NF.2, 3.NF.3 &mdash; Unit fractions; number line; equivalence.</p><h3>Topic 1 — What is a Fraction?</h3><p>A <strong>fraction</strong> shows part of a whole. It has TWO parts: the top is the NUMERATOR, the bottom is the DENOMINATOR.</p><p><strong>3/4</strong> means \"3 out of 4 equal parts.\"</p><h3>Topic 2 — Fractions on a Number Line</h3><p>Draw a line from 0 to 1. Divide it into 4 equal parts. The ticks are 1/4, 2/4, 3/4, 4/4 (=1).</p><p>Draw another line 0 to 1, divide into 8 parts. Ticks: 1/8, 2/8, ..., 8/8.</p><p><strong>Observation:</strong> 2/8 lands at the same place as 1/4! They're the same amount.</p><h3>Topic 3 — Fractions of a Group</h3><p>Not just parts of a pizza — fractions also describe GROUPS.</p><p><strong>Example:</strong> 20 students, 12 have brown eyes. Fraction with brown eyes = 12/20 = 3/5.</p><p><strong>Simplify:</strong> Divide top and bottom by the same number. 12/20 → 6/10 → 3/5.</p><h3>Topic 4 — Equivalent Fractions</h3><p>Two fractions are EQUIVALENT if they show the same amount.</p><p>1/2 = 2/4 = 3/6 = 4/8 = 5/10.</p><p><strong>How to check:</strong> Multiply or divide top and bottom by the same number. 1/2 × (3/3) = 3/6. Same amount.</p><h3>Topic 5 — Comparing Fractions</h3><p><strong>Same denominator:</strong> bigger numerator wins. 3/5 &gt; 2/5.</p><p><strong>Same numerator:</strong> smaller denominator wins (fewer, bigger slices). 1/2 &gt; 1/4.</p><p><strong>Different both:</strong> convert to equivalent fractions with the same denominator.</p>",
  "fossils": "<h2>📐 Math Focus: Multiply by Multiples of 10</h2><p><em>Common Core:</em> 3.NBT.3 &mdash; Multiply one-digit whole numbers by multiples of 10 (10–90); 3.NBT.1 &mdash; Round.</p><h3>Topic 1 — Place Value Refresher</h3><p>Every digit has a PLACE. Reading right to left: ones, tens, hundreds, thousands, ten-thousands, hundred-thousands, millions.</p><p><strong>Example:</strong> 68,000,000 = 68 million. Expanded: 60,000,000 + 8,000,000.</p><h3>Topic 2 — Multiplying by 10 (the Zero Trick)</h3><p>To multiply by 10, just add a 0 to the right.</p><p>7 × 10 = 70. 12 × 10 = 120. 8 × 10 = 80.</p><p><strong>Why?</strong> Because every digit shifts one place to the LEFT (tens become hundreds, etc.).</p><h3>Topic 3 — Multiplying by Multiples of 10</h3><p>Break the multiple of 10 into (single digit × 10). Multiply the small parts, then add the zero.</p><p><strong>Example:</strong> 6 × 40 = 6 × (4 × 10) = (6 × 4) × 10 = 24 × 10 = <strong>240</strong>.</p><p><strong>Try:</strong> 7 × 30 = 7 × 3 × 10 = 21 × 10 = 210.</p><h3>Topic 4 — Multiplying by 100 and 1,000</h3><p>× 100 → add two zeros. × 1,000 → add three zeros.</p><p>5 × 100 = 500. 3 × 1,000 = 3,000. 7 × 1,000,000 = 7,000,000.</p><h3>Topic 5 — Big-Number Estimation (Rounding + Multiply)</h3><p>Round first, then multiply.</p><p><strong>Example:</strong> A dinosaur weighed 68,000 lb. About how much did 5 of them weigh? Round 68,000 → 70,000. Then 5 × 70,000 = 350,000 lb.</p><h3>Try It Together</h3><p>Dinosaur ages: T. rex 68 mya (million years ago), Triceratops 66 mya, Stegosaurus 150 mya.</p><ol><li>Round each to nearest 10 million: 70, 70, 150.</li><li>7 × 10 million = 70 million (matches T. rex).</li><li>Difference Stegosaurus − T. rex: 150 − 68 = 82 million years.</li><li>How many 10-million-year chunks in 150 million? 150 ÷ 10 = 15 chunks.</li></ol>",
  "adaptations": "<h2>📐 Math Focus: Division Facts &amp; Sharing</h2><p><em>Common Core:</em> 3.OA.2, 3.OA.6, 3.OA.7 &mdash; Divide within 100; unknown-factor multiplication.</p><h3>Topic 1 — What is Division?</h3><p>Division is <strong>equal sharing</strong>. Split a total into equal groups.</p><p><strong>Example:</strong> 24 worms shared with 4 chicks. Each chick gets 24 ÷ 4 = <strong>6 worms</strong>.</p><p><strong>Vocabulary:</strong> The number being divided is the DIVIDEND. The number of groups is the DIVISOR. The answer is the QUOTIENT.</p><h3>Topic 2 — Division as Unknown-Factor Multiplication</h3><p>Ask yourself: \"What × 4 = 24?\" Answer: 6. So 24 ÷ 4 = 6.</p><p>This is why LEARNING multiplication facts also gives you division facts. If you know 6 × 4 = 24, you already know 24 ÷ 4 = 6 and 24 ÷ 6 = 4.</p><h3>Topic 3 — Fact Families</h3><p>Every trio of numbers (3, 4, 12) gives 4 facts:</p><ul><li>3 × 4 = 12</li><li>4 × 3 = 12</li><li>12 ÷ 3 = 4</li><li>12 ÷ 4 = 3</li></ul><p>Practice writing fact families for: (2, 5, 10), (6, 7, 42), (8, 9, 72).</p><h3>Topic 4 — Two Kinds of Division Problems</h3><p><strong>Sharing (partitive):</strong> 30 fish shared among 5 pelicans. Each pelican gets ___ fish. (30 ÷ 5 = 6.)</p><p><strong>Grouping (quotative):</strong> 30 fish put into groups of 5. How many groups? (30 ÷ 5 = 6.)</p><h3>Topic 5 — Remainders</h3><p>Not everything divides evenly. 25 ÷ 4 = 6 remainder 1. Check: 6 × 4 = 24; 25 − 24 = 1 left over.</p><p><strong>Real-world:</strong> If 25 acorns are shared by 4 squirrels, each gets 6 acorns and 1 acorn is left over.</p><h3>Try It Together</h3><p>A wolf pack of 6 shares 42 lb of meat equally.</p><ol><li>Each wolf gets: 42 ÷ 6 = <strong>7 lb</strong>.</li><li>Check with multiplication: 6 × 7 = 42 ✓.</li><li>Fact family: 6 × 7 = 42, 7 × 6 = 42, 42 ÷ 6 = 7, 42 ÷ 7 = 6.</li></ol>",
  "water-cycle": "<h2>📐 Math Focus: Capacity Measurement</h2><p><em>Common Core:</em> 3.MD.2 &mdash; Measure and estimate liquid volumes.</p><h3>Topic 1 — Milliliters and Liters</h3><p><strong>Milliliter (mL):</strong> a very small amount — about 20 drops of water.</p><p><strong>Liter (L):</strong> about the size of a big water bottle.</p><p><strong>1 L = 1,000 mL.</strong> Always. This is like 1 km = 1,000 m.</p><h3>Topic 2 — Reference Sizes</h3><ul><li>1 mL ≈ 1 raindrop</li><li>5 mL ≈ 1 teaspoon</li><li>200 mL ≈ small juice box</li><li>500 mL ≈ soda bottle</li><li>1 L ≈ big water bottle</li><li>4 L ≈ gallon milk jug</li></ul><h3>Topic 3 — Converting mL ↔ L</h3><p><strong>L → mL:</strong> multiply by 1,000. 3 L = 3,000 mL.</p><p><strong>mL → L:</strong> divide by 1,000. 2,500 mL = 2.5 L.</p><h3>Topic 4 — Adding Capacities</h3><p><strong>Example:</strong> 300 mL + 200 mL + 400 mL = 900 mL.</p><p><strong>With units:</strong> Add L + L, add mL + mL, then combine. 1 L 200 mL + 500 mL = 1 L 700 mL.</p><h3>Topic 5 — Measuring in Real Life</h3><p><strong>Tools:</strong> graduated cylinder, measuring cup, beaker.</p><p><strong>Reading a graduated cylinder:</strong> Read at eye level. The bottom of the CURVE (meniscus) is the true value.</p><h3>Try It Together</h3><p>Rain gauge collects 250 mL Mon, 150 mL Tue, 400 mL Wed.</p><ol><li>Total in mL: 250 + 150 + 400 = 800 mL.</li><li>Convert to L: 800 ÷ 1,000 = 0.8 L.</li><li>How much more to reach 1 L? 1,000 − 800 = 200 mL.</li></ol>",
  "natural-hazards": "<h2>📐 Math Focus: Estimation &amp; Rounding</h2><p><em>Common Core:</em> 3.NBT.1, 3.NBT.2 &mdash; Rounding; adding &amp; subtracting within 1,000.</p><h3>Topic 1 — Why Estimate?</h3><p>Real science uses HUGE numbers. Nobody says a hurricane has 137.8 mph winds — they say \"about 140.\" Rounding makes numbers easier to talk about and compare.</p><h3>Topic 2 — Rounding to Nearest 10</h3><p>Look at the ones digit. 5 or more → up. Less than 5 → down.</p><p>128 → 130. 132 → 130. 135 → 140.</p><h3>Topic 3 — Rounding to Nearest 100</h3><p>Look at the tens digit. 5 or more → up. Less than 5 → down.</p><p>342 mm → 300 mm. 375 mm → 400 mm.</p><h3>Topic 4 — Estimating Sums and Differences</h3><p>Round first, then compute.</p><p><strong>Exact:</strong> 342 + 268 = 610.</p><p><strong>Estimated:</strong> 300 + 300 = 600. Close to 610 ✓.</p><h3>Topic 5 — Comparing Big Events</h3><p>Hurricane A: 138 mph. Hurricane B: 165 mph. Round both to nearest 10 → 140 vs 170. Hurricane B is stronger by ~30 mph.</p><h3>Try It Together</h3><p>Wildfires burned these acreages: 875, 342, 168, 429.</p><ol><li>Round each to nearest 100: 900, 300, 200, 400.</li><li>Total estimated: 900 + 300 + 200 + 400 = 1,800 acres.</li><li>Total actual: 875 + 342 + 168 + 429 = 1,814 acres. Close!</li></ol>",
  "rocks-shapes": "<h2>📐 Math Focus: 2D Shapes &amp; Perimeter</h2><p><em>Common Core:</em> 3.G.1 &mdash; Classify shapes by attributes; 3.MD.8 &mdash; Solve real-world perimeter problems.</p><h3>Topic 1 — Attributes of Shapes</h3><p>Every shape has ATTRIBUTES: number of sides, number of angles, whether sides are equal, whether angles are right.</p><p>A <strong>right angle</strong> is a square corner (90°). Test it with the corner of a paper.</p><h3>Topic 2 — Special Quadrilaterals</h3><p>A <strong>quadrilateral</strong> is any 4-sided closed shape. Here are the important ones:</p><table><tr><th>Shape</th><th>Rule</th></tr><tr><td><strong>Square</strong></td><td>4 equal sides + 4 right angles</td></tr><tr><td><strong>Rectangle</strong></td><td>4 right angles (opposite sides equal)</td></tr><tr><td><strong>Rhombus</strong></td><td>4 equal sides (angles not necessarily right)</td></tr><tr><td><strong>Parallelogram</strong></td><td>2 pairs of parallel sides</td></tr><tr><td><strong>Trapezoid</strong></td><td>Exactly 1 pair of parallel sides</td></tr></table><h3>Topic 3 — Shape Hierarchies</h3><p>Every SQUARE is a RECTANGLE (has 4 right angles). Every RECTANGLE is a PARALLELOGRAM. Every RHOMBUS is a PARALLELOGRAM.</p><p>But not every rectangle is a square (only if all 4 sides are equal).</p><h3>Topic 4 — Perimeter: Distance Around</h3><p><strong>Perimeter</strong> is the total distance around the outside of a shape. Just add up all the sides.</p><p><strong>Example:</strong> A rectangle 5 cm × 3 cm has perimeter 5 + 3 + 5 + 3 = 16 cm.</p><p><strong>Shortcut for rectangles:</strong> 2 × (L + W) = 2 × 8 = 16 cm.</p><p><strong>Square:</strong> 4 × side. A 6-cm square has perimeter 4 × 6 = 24 cm.</p><h3>Topic 5 — Missing-Side Perimeter Problems</h3><p><strong>Given:</strong> A rectangle has perimeter 20 cm and length 6 cm. What's the width?</p><p>2 × (6 + W) = 20 → 6 + W = 10 → W = 4 cm.</p><p><strong>Given:</strong> A pentagon has perimeter 25 cm and 4 sides are 5 cm each. What is the 5th side? (20 + s = 25 → s = 5 cm.)</p><h3>Try It Together</h3><p>You trace a crystal outline that turns out to be a rectangle 8 cm × 3 cm.</p><ol><li>Perimeter: 2 × (8 + 3) = <strong>22 cm</strong>.</li><li>Is it a square? No — sides are unequal.</li><li>Is it a rectangle? Yes — 4 right angles.</li><li>Is it also a parallelogram? Yes — every rectangle is a parallelogram.</li></ol>",
};
let currentUnit = null;

function resourceCardHTML(unit) {
  const phetBtn = unit.phetUrl ? `<a class="btn-phet" href="${unit.phetUrl}" target="_blank">🧪 PhET Simulation</a>` : '';
  const ytBtn = `<a class="btn-yt" href="https://www.youtube.com/results?search_query=${encodeURIComponent(unit.ytSearch)}" target="_blank">▶️ YouTube</a>`;
  const ixlBtn = unit.ixlUrl ? `<a class="btn-ixl" href="${unit.ixlUrl}" target="_blank" rel="noopener">📚 IXL Practice</a>` : '';
  return `<div class="resource-card"><h3>📚 Resources</h3><div class="resource-btns">${phetBtn}${ixlBtn}${ytBtn}</div></div>`;
}


function showScienceConnection() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('science-screen').classList.add('active');
  const content = SCIENCE_CONNECTIONS[currentUnit] || '<p>No science connection available for this unit yet.</p>';
  document.getElementById('science-content').innerHTML = content;
}

function renderHome() {
  const grid = document.getElementById('units-grid');
  grid.innerHTML = '';
  UNITS.forEach(unit => {
    const card = document.createElement('div');
    card.className = 'unit-card';
    card.onclick = () => showLesson(unit.id);
    card.innerHTML = `
      <div class="unit-card-header">
        <div class="unit-card-icon">${unit.icon}</div>
        <div class="unit-card-meta">
          <div class="unit-card-title">${unit.title}${completedUnits[unit.id]?' ✅':''}</div>
          <div class="unit-card-cc">${unit.cc}</div>
        </div>
      </div>
      <div class="unit-card-desc">${unit.desc}</div>
      <div class="unit-card-pills">
        <div class="pill">📖 Lesson</div>
        <div class="pill">📋 Worksheet</div>
        <div class="pill">▶️ YouTube</div>
      </div>`;
    grid.appendChild(card);
  });
}

function renderSidebar() {
  const sidebar = document.getElementById('sidebar-content');
  sidebar.innerHTML = '';
  UNITS.forEach((unit, idx) => {
    const item = document.createElement('div');
    item.className = 'sidebar-item' + (currentUnit === unit.id ? ' active' : '');
    item.textContent = `${idx + 1}. ${unit.title}${completedUnits[unit.id]?' ✅':''}`;
    item.onclick = () => showLesson(unit.id);
    sidebar.appendChild(item);
  });
}

function setTopbar() {
  document.getElementById('topbar-title').textContent = currentUnit ? UNITS.find(u => u.id === currentUnit).title : 'Exploring the World with Math';
}

function showHome() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('home-screen').classList.add('active');
  currentUnit = null;
  renderHome();
  renderSidebar();
  setTopbar();
}

function showLesson(unitId) {
  currentUnit = unitId;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('lesson-screen').classList.add('active');
  const unit = UNITS.find(u => u.id === unitId);
  document.getElementById('lesson-content').innerHTML = LESSONS[unitId] + resourceCardHTML(unit);
  renderSidebar();
  setTopbar();
}

function showWorksheet() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('worksheet-screen').classList.add('active');
  const ws = WORKSHEETS[currentUnit];
  let html = '';
  ws.forEach((p, idx) => {
    html += `<div class="problem"><h4>Problem ${idx + 1}</h4><p>${p.q}</p><textarea id="ans-${idx}" placeholder="Your answer..."></textarea></div>`;
  });
  document.getElementById('worksheet-content').innerHTML = html;
}

function checkWorksheet() {
  const ws = WORKSHEETS[currentUnit];
  let html = '';
  ws.forEach((p, idx) => {
    const userAns = document.getElementById(`ans-${idx}`).value;
    html += `<div class="problem"><h4>Problem ${idx + 1}</h4><p>${p.q}</p><div class="answer-key"><strong>Answer:</strong> ${p.answer}</div><p><strong>Your answer:</strong> ${userAns || '(no answer)'}</p></div>`;
  });
  document.getElementById('worksheet-content').innerHTML = html;
}

function showQuiz() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('quiz-screen').classList.add('active');
  const quiz = QUIZZES[currentUnit];
  let html = `
    <div style="background:#f0f4ff;padding:14px;border-radius:8px;margin-bottom:15px;border-left:4px solid #1B3A8A;">
      <label style="display:block;font-weight:600;color:#1B3A8A;margin-bottom:6px;">Student Name:</label>
      <input type="text" id="student-name" placeholder="Type your full name"
        style="width:100%;padding:8px;border:1px solid #ccc;border-radius:4px;font-size:14px;" />
    </div>
  `;
  quiz.forEach((q, idx) => {
    html += `<div class="quiz-question"><h4>Question ${idx + 1}</h4><p>${q.q}</p>`;
    q.opts.forEach((opt, optIdx) => {
      html += `<label><input type="radio" name="q${idx}" value="${optIdx}"> ${opt}</label>`;
    });
    html += `</div>`;
  });
  document.getElementById('quiz-content').innerHTML = html;
}

// Quiz results stored at latest submission so email button can use them.
let lastQuizResults = null;

function submitQuiz() {
  const quiz = QUIZZES[currentUnit];
  const studentName = (document.getElementById('student-name')?.value || '').trim();
  let score = 0;
  const breakdown = [];
  quiz.forEach((q, idx) => {
    const selected = document.querySelector(`input[name="q${idx}"]:checked`);
    const selectedIdx = selected ? parseInt(selected.value) : -1;
    const isCorrect = selectedIdx === q.ans;
    if (isCorrect) score++;
    breakdown.push({
      n: idx + 1,
      question: q.q,
      studentAnswer: selectedIdx >= 0 ? q.opts[selectedIdx] : '(no answer)',
      correctAnswer: q.opts[q.ans],
      correct: isCorrect
    });
  });
  const percent = Math.round((score / quiz.length) * 100);
  completedUnits[currentUnit] = true;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('certificate-screen').classList.add('active');

  const unitObj = UNITS.find(u => u.id === currentUnit);
  const unitTitle = unitObj ? unitObj.title : currentUnit;

  lastQuizResults = { studentName, unitTitle, score, total: quiz.length, pct: percent, breakdown };

  const nameLine = studentName
    ? `<p><strong>Student:</strong> ${studentName}</p>`
    : `<p style="color:#b91c1c;"><em>Tip: type your name on the quiz screen before submitting so Mrs. Won knows who you are.</em></p>`;

  document.getElementById('cert-content').innerHTML = `
    <div style="padding: 20px;">
      ${nameLine}
      <p><strong>Unit:</strong> ${unitTitle}</p>
      <p style="font-size: 24px; margin: 20px 0;">Quiz Score: ${score}/${quiz.length} (${percent}%)</p>
      <p>${percent === 100 ? "Perfect! 🌟" : percent >= 67 ? "Nice work! Keep practicing." : "Good try! Review the lesson and try again."}</p>
      <div style="margin-top:18px;">
        <button class="btn" onclick="emailResults()" style="background:#1B3A8A;color:white;padding:10px 18px;font-size:14px;border:none;border-radius:6px;cursor:pointer;">
          📧 Submit Quiz to Mrs. Won
        </button>
      </div>
      <p style="margin-top:10px;font-size:12px;color:#666;">
        Tapping the button opens Gmail with the score and answers filled in. Just press Send.
      </p>
    </div>
  `;
  renderSidebar();
  updateProgress();
}

function emailResults() {
  if (!lastQuizResults) return;
  const r = lastQuizResults;
  const lines = [];
  lines.push(`Aloha Mrs. Won,`);
  lines.push(``);
  lines.push(`A 3rd-grade integrated science &amp; math quiz was just submitted.`);
  lines.push(``);
  lines.push(`Student: ${r.studentName || '(name not provided)'}`);
  lines.push(`Unit: ${r.unitTitle}`);
  lines.push(`Score: ${r.score} out of ${r.total} (${r.pct}%)`);
  lines.push(``);
  lines.push(`--- Detailed Answers ---`);
  r.breakdown.forEach(b => {
    lines.push(``);
    lines.push(`Q${b.n}. ${b.question}`);
    lines.push(`   Student's answer: ${b.studentAnswer}`);
    lines.push(`   Correct answer:   ${b.correctAnswer}`);
    lines.push(`   ${b.correct ? '✓ Correct' : '✗ Incorrect'}`);
  });
  lines.push(``);
  lines.push(`Mahalo,`);
  lines.push(`Mary, Star of the Sea School — Grade 3 Science &amp; Math`);

  const subject = `Grade 3 Science &amp; Math Quiz Result — ${r.studentName || 'Student'} — ${r.unitTitle} — ${r.pct}%`;
  const body = lines.join('\n');
  const to = 'ewon@starofthesea.org';

  const gmailUrl = `https://mail.google.com/mail/?view=cm&fs=1&tf=1`
    + `&to=${encodeURIComponent(to)}`
    + `&su=${encodeURIComponent(subject)}`
    + `&body=${encodeURIComponent(body)}`;
  window.open(gmailUrl, '_blank');
}

function updateProgress() {
  const completed = Object.keys(completedUnits).length;
  document.getElementById('progress-text').textContent = `${completed}/${UNITS.length}`;
}

function showHandout() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('handout-screen').classList.add('active');
  const h = HANDOUTS_5[currentUnit];
  if (!h) {
    document.getElementById('handout-content').innerHTML = '<p>No handout available for this unit.</p>';
    return;
  }
  const stepsHtml = h.steps.map(s => `<li>${s}</li>`).join('');
  const reflectHtml = h.reflect.map((r,i) => `<li>${r}</li>`).join('');
  const akFile = ANSWER_KEYS_5[currentUnit];
  const answerKeyHtml = akFile ? `
      <div style="background:#E8F5E9;border:2px solid #2E7D32;border-radius:8px;padding:14px;margin:14px 0;">
        <strong style="color:#1B3A8A;">📗 Answer Key (for self-check):</strong>
        <a href="answerkeys/${akFile}" download style="display:inline-block;background:#2E7D32;color:#fff;padding:8px 16px;border-radius:6px;text-decoration:none;font-weight:600;margin:6px 8px 6px 0;">Download ${akFile}</a>
        <div style="font-size:0.9rem;color:#555;margin-top:6px;">Completed workbook with all formulas, charts, and real-world data. Open in Excel or upload to Google Sheets (<em>File → Import → Upload</em>) to compare with your own work after you finish.</div>
      </div>` : '';
  document.getElementById('handout-content').innerHTML = `
    <div class="handout-card">
      <h3>${h.title}</h3>
      <div class="handout-science">${h.science}</div>
      <div class="handout-mission">${h.mission}</div>
      <p><strong>📋 Step-by-Step Instructions</strong></p>
      <ol class="handout-steps">${stepsHtml}</ol>
      <div class="handout-deliverable">
        <strong>🎯 What to Submit:</strong>
        ${h.deliverable}
      </div>
      ${answerKeyHtml}
      <div class="handout-reflect">
        <strong>💭 Reflection Questions:</strong>
        <ol>${reflectHtml}</ol>
      </div>
    </div>`;
}

document.addEventListener('DOMContentLoaded', () => {
  renderHome();
  renderSidebar();
});
  </script>
</body>
</html>
