  <script>
let completedUnits = {};
const UNITS = [
  { id:'weather-detectives', title:"Weather Detectives", icon:'🌦️', cc:'3-ESS2 + 3.MD.3-4', desc:'Track daily weather. Build bar graphs of temperature; line plots of rainfall. Compare cities.', ytSearch:'3rd grade weather patterns bar graphs khan academy' },

  { id:'plants-grow', title:"Plants Grow: Measure & Fractions", icon:'🌱', cc:'3-LS1 + 3.MD.1-2 + 3.NF.1', desc:'Measure plant height weekly. Show parts of a plant as fractions.', ytSearch:'3rd grade plant parts fractions measurement growth' },
  { id:'forces-motion', title:"Forces & Motion Lab", icon:'⚙️', cc:'3-PS2 + 3.MD.1', desc:'Push, pull, magnets, friction. Measure distances a toy car rolls; compare speeds.', ytSearch:'3rd grade forces motion push pull magnets' },
  { id:'ecosystems', title:"Ecosystems: Grouping & Division", icon:'🌳', cc:'3-LS2 + 3.OA.6-7', desc:'Food chains and food webs. Divide food fairly. Multiply predator-prey ratios.', ytSearch:'3rd grade food chains ecosystems division' },
  { id:'habitats', title:"Habitat Design", icon:'🏞️', cc:'3-LS4 + 3.MD.5-8', desc:'Design an animal habitat. Compute area, perimeter, and fencing.', ytSearch:'3rd grade animal habitats area perimeter' },
  { id:'heredity', title:"Heredity & Traits", icon:'👨‍👩‍👧', cc:'3-LS3 + 3.NF.1-2', desc:'Survey inherited traits (eye color, tongue-rolling). Fractions of your class.', ytSearch:'3rd grade inherited traits genetics fractions' },
  { id:'fossils', title:"Fossils & Big Numbers", icon:'🦕', cc:'3-LS4 + 3.NBT.1', desc:'Dinosaurs lived millions of years ago. Round large numbers; compare ages.', ytSearch:'3rd grade fossils dinosaur timeline large numbers' },
  { id:'adaptations', title:"Adaptations & Populations", icon:'🐢', cc:'3-LS4 + 3.OA.8', desc:'How animals fit their environment. Multi-step word problems about populations.', ytSearch:'3rd grade animal adaptations population word problems' },
  { id:'water-cycle', title:"Water Cycle & Capacity", icon:'💧', cc:'3-ESS2 + 3.MD.2', desc:'Evaporation, condensation, precipitation. Measure water in mL and L.', ytSearch:'3rd grade water cycle capacity measurement' },
  { id:'natural-hazards', title:"Natural Hazards & Estimation", icon:'⚡', cc:'3-ESS3 + 3.NBT.1', desc:'Storms, floods, earthquakes. Estimate magnitudes; round to compare.', ytSearch:'3rd grade natural hazards estimation weather safety' },
  { id:'rocks-shapes', title:"Rocks, Crystals & 2D Shapes", icon:'💎', cc:'3-ESS2 + 3.G.1-2', desc:'Identify rocks and crystal shapes. Classify quadrilaterals in nature.', ytSearch:'3rd grade rocks crystals geometric shapes' },
];

const LESSONS = {
  "weather-detectives": "<h2>🌦️ Weather Detectives</h2><h3>The Science</h3><p>Weather changes every day, but over weeks and months you can see PATTERNS. Weather scientists (meteorologists) track daily temperature, rainfall, wind, and clouds to predict what's coming.</p><h3>The Math Skill: Bar Graphs &amp; Line Plots</h3><p>Every scientist turns numbers into pictures. A BAR GRAPH shows how tall each day's temperature is. A LINE PLOT shows how often each rainfall amount happens.</p><p><strong>Example:</strong> Daily high temperatures: Mon 72°, Tue 75°, Wed 78°, Thu 70°, Fri 68°.</p><p>Draw 5 bars. Which is tallest? Which is shortest? What is the range (highest − lowest)? 78 − 68 = <strong>10°</strong>.</p><h3>Try This</h3><p>For 5 days, record the outdoor temperature at 9am. Round each to the nearest 5°. Draw a bar graph. Circle the hottest day.</p><h3>Vocabulary</h3><ul><li><strong>Temperature</strong> — how hot or cold the air is</li><li><strong>Precipitation</strong> — rain, snow, hail</li><li><strong>Range</strong> — biggest number minus smallest</li><li><strong>Bar graph</strong> — bars show category counts</li></ul>",
  "life-cycles": "<h2>🦋 Life Cycles &amp; Multiplication</h2><h3>The Science</h3><p>Every animal has a life cycle. A butterfly goes: egg → caterpillar → chrysalis → adult. A frog: egg → tadpole → froglet → adult. A chicken: egg → chick → adult.</p><h3>The Math Skill: Multiplication as Equal Groups</h3><p>Animals lay eggs in equal groups! A butterfly lays 5 clusters of 8 eggs each. Total = 5 × 8 = <strong>40 eggs</strong>.</p><p>Multiplication is a fast way to count equal groups.</p><p><strong>Example:</strong> A frog lays 4 clusters of 6 eggs. Total = 4 × 6 = <strong>24 eggs</strong>. If only ½ hatch, that's 12 tadpoles.</p><h3>Try This</h3><p>Pretend you're a butterfly. Draw 4 groups of 5 eggs. Circle each group. Count by 5s: 5, 10, 15, 20. That's the same as 4 × 5 = 20.</p><h3>Vocabulary</h3><ul><li><strong>Life cycle</strong> — the stages an animal goes through</li><li><strong>Equal groups</strong> — groups of the same size</li><li><strong>Product</strong> — the answer to a multiplication problem</li></ul>",
  "plants-grow": "<h2>🌱 Plants Grow: Measure &amp; Fractions</h2><h3>The Science</h3><p>Plants have parts: roots, stem, leaves, flowers. Each part has a job. Plants need sunlight, water, and soil to grow.</p><h3>The Math Skill: Measurement &amp; Fractions</h3><p>Measure plants with a ruler (cm). Track growth week by week. Show parts as fractions of the whole plant.</p><p><strong>Example:</strong> A plant is 12 cm tall. Roots take up 3 cm. Fraction of plant that's roots = 3/12 = <strong>1/4</strong>.</p><p>Week 1: 5 cm. Week 2: 8 cm. Growth = 8 − 5 = 3 cm.</p><h3>Try This</h3><p>Grow a bean plant. Measure it every week for 4 weeks. Make a bar graph of its heights. Draw the plant divided into 4 equal sections showing roots (1/4), stem (1/4), leaves (1/4), flower (1/4).</p><h3>Vocabulary</h3><ul><li><strong>Roots, stem, leaves, flower</strong> — parts of a plant</li><li><strong>Centimeter (cm)</strong> — a unit for measuring length</li><li><strong>Fraction</strong> — part of a whole</li></ul>",
  "forces-motion": "<h2>⚙️ Forces &amp; Motion Lab</h2><h3>The Science</h3><p>A FORCE is a push or a pull. Forces make things move, stop, or change direction. Magnets pull metal without touching. Friction slows things down.</p><h3>The Math Skill: Measurement &amp; Comparison</h3><p>Measure how far a toy car rolls. Compare two ramps to see which is faster.</p><p><strong>Example:</strong> Car A rolls 45 cm on wood; Car B rolls 78 cm on plastic. Difference: 78 − 45 = <strong>33 cm</strong>. Plastic has less friction.</p><h3>Try This</h3><p>Roll a toy car down a ramp made of cardboard, then a ramp made of a smooth book. Measure each roll with a ruler. Which surface let the car roll farther? Why?</p><h3>Vocabulary</h3><ul><li><strong>Force</strong> — a push or pull</li><li><strong>Friction</strong> — slows down moving objects</li><li><strong>Magnet</strong> — pulls certain metals</li><li><strong>Distance</strong> — how far something travels</li></ul>",
  "ecosystems": "<h2>🌳 Ecosystems: Grouping &amp; Division</h2><h3>The Science</h3><p>An ECOSYSTEM is all the living and non-living things in one place — plants, animals, water, soil, air. A FOOD CHAIN shows who eats whom: grass → grasshopper → frog → snake → hawk.</p><h3>The Math Skill: Multiplication &amp; Division</h3><p>Every level of the food chain needs 10 times as much energy as the level above it.</p><p><strong>Example:</strong> A robin brings 24 worms to 4 baby chicks. Each chick gets 24 ÷ 4 = <strong>6 worms</strong>.</p><p><strong>Predator-prey:</strong> 1 hawk needs 8 mice to survive. If 5 hawks live in a forest, they need 5 × 8 = 40 mice per month.</p><h3>Try This</h3><p>Draw a food chain with 4 levels. Label who eats whom. Then compute: if a fox eats 12 rabbits per year and there are 5 foxes, how many rabbits total? (12 × 5 = 60)</p><h3>Vocabulary</h3><ul><li><strong>Ecosystem</strong> — a community of living things and their environment</li><li><strong>Food chain</strong> — who eats whom</li><li><strong>Predator/prey</strong> — hunter/hunted</li></ul>",
  "habitats": "<h2>🏞️ Habitat Design</h2><h3>The Science</h3><p>A HABITAT is the natural home of an animal. Different animals need different habitats: fish live in water, rabbits in fields, bats in caves. Habitat size matters — big animals need more space.</p><h3>The Math Skill: Area &amp; Perimeter</h3><p>Area = space inside a shape. Perimeter = distance around it.</p><p><strong>Example:</strong> A rabbit pen is 5 ft × 4 ft. Area = 5 × 4 = 20 sq ft. Perimeter = 2(5+4) = <strong>18 ft of fencing</strong>.</p><h3>Try This</h3><p>Design a habitat for a chosen animal. Draw its enclosure (rectangle) on grid paper. Compute area and perimeter. Decide how many food dishes fit (each takes 1 sq ft).</p><h3>Vocabulary</h3><ul><li><strong>Habitat</strong> — an animal's natural home</li><li><strong>Area</strong> — space inside (sq ft, sq m)</li><li><strong>Perimeter</strong> — distance around (ft, m)</li></ul>",
  "heredity": "<h2>👨‍👩‍👧 Heredity &amp; Traits</h2><h3>The Science</h3><p>TRAITS are features you inherit from parents (eye color, hair color, ear shape). Other traits you learn (riding a bike, speaking a language). Every trait comes from GENES.</p><h3>The Math Skill: Fractions</h3><p>Survey your class. How many students have brown eyes? Blue? Green? Show as a fraction of the whole class.</p><p><strong>Example:</strong> 20 students in a class: 12 have brown eyes, 5 have blue, 3 have green. Fractions: 12/20 = 3/5 brown; 5/20 = 1/4 blue; 3/20 green.</p><h3>Try This</h3><p>Survey 10 friends for a trait (attached earlobes, dimples, freckles). Write each count as a fraction of 10. Which trait is most common?</p><h3>Vocabulary</h3><ul><li><strong>Trait</strong> — a feature of a living thing</li><li><strong>Inherited</strong> — passed from parents</li><li><strong>Fraction</strong> — part / whole</li></ul>",
  "fossils": "<h2>🦕 Fossils &amp; Big Numbers</h2><h3>The Science</h3><p>A FOSSIL is what's left of a plant or animal that lived long ago. Dinosaurs lived about 65 million years ago. Fossils tell us how life on Earth has changed.</p><h3>The Math Skill: Round &amp; Compare Large Numbers</h3><p>Scientists round huge numbers to make them easier to talk about.</p><p><strong>Example:</strong> Tyrannosaurus rex lived 68 million years ago. Rounded to nearest 10 million: <strong>70 million</strong>. That's older than Triceratops (66 mya).</p><p>Which is more: 65,000,000 or 100,000,000? Compare the leading digits.</p><h3>Try This</h3><p>Make a dinosaur timeline. Round each age to the nearest 10 million. Order them from oldest to youngest.</p><h3>Vocabulary</h3><ul><li><strong>Fossil</strong> — preserved remains of ancient life</li><li><strong>Million</strong> — 1,000,000</li><li><strong>Round</strong> — replace with a friendlier close number</li></ul>",
  "adaptations": "<h2>🐢 Adaptations &amp; Populations</h2><h3>The Science</h3><p>An ADAPTATION is a body part or behavior that helps an animal survive. A turtle's shell protects it. A cheetah's speed helps it hunt. A camel's hump stores fat.</p><h3>The Math Skill: Multi-Step Word Problems</h3><p>Real science asks multi-step questions.</p><p><strong>Example:</strong> A meadow has 8 rows of 6 rabbits. A hawk eats 5 rabbits. How many left? (8 × 6 = 48; 48 − 5 = <strong>43 rabbits</strong>.)</p><h3>Try This</h3><p>Pick an animal. Research one adaptation. Then invent a math problem: \"A population of 6 penguins per iceberg × 4 icebergs = 24 penguins. If 8 travel south, ___ remain.\"</p><h3>Vocabulary</h3><ul><li><strong>Adaptation</strong> — a trait that helps survival</li><li><strong>Population</strong> — total number of one species in an area</li><li><strong>Multi-step</strong> — a problem with more than one operation</li></ul>",
  "water-cycle": "<h2>💧 Water Cycle &amp; Capacity</h2><h3>The Science</h3><p>Water moves around the Earth: EVAPORATION (liquid → gas), CONDENSATION (gas → droplets in clouds), PRECIPITATION (rain, snow), COLLECTION (rivers, oceans).</p><h3>The Math Skill: Capacity (mL and L)</h3><p>Water is measured by how much space it takes up. 1 liter (L) = 1,000 milliliters (mL). A juice box is about 200 mL; a soda bottle 500 mL; a milk jug 4 L.</p><p><strong>Example:</strong> A rain gauge collects 250 mL Mon, 150 mL Tue, 400 mL Wed. Total = 800 mL. Convert to liters: 800 mL = <strong>0.8 L</strong>.</p><h3>Try This</h3><p>Set up 3 rain gauges in different spots (open field, under a tree, near a wall). Compare total collected over a week. Draw the water cycle showing what happens to that rain.</p><h3>Vocabulary</h3><ul><li><strong>Evaporation, condensation, precipitation</strong> — water cycle stages</li><li><strong>Milliliter (mL), Liter (L)</strong> — capacity units</li><li><strong>1 L = 1,000 mL</strong></li></ul>",
  "natural-hazards": "<h2>⚡ Natural Hazards &amp; Estimation</h2><h3>The Science</h3><p>Natural HAZARDS are dangerous events from nature: hurricanes, tornadoes, earthquakes, floods, wildfires. Scientists estimate how big each event is to warn people.</p><h3>The Math Skill: Estimation &amp; Rounding</h3><p>Hurricane winds can reach 150 mph. Rounded to the nearest 10: 150 mph. To the nearest 100: 200 mph. Meteorologists ROUND to communicate quickly.</p><p><strong>Example:</strong> An earthquake registers 4.2 on the Richter scale; another is 5.8. Which is bigger? 5.8. Difference: 5.8 − 4.2 = 1.6 points. Each point is 10× stronger.</p><h3>Try This</h3><p>Look up 3 hurricanes from history. Round each wind speed to the nearest 10 mph. Rank them strongest to weakest. Make a safety plan for your family (3 things to do).</p><h3>Vocabulary</h3><ul><li><strong>Natural hazard</strong> — dangerous natural event</li><li><strong>Round</strong> — replace with a friendly nearby number</li><li><strong>Estimate</strong> — a smart guess</li></ul>",
  "rocks-shapes": "<h2>💎 Rocks, Crystals &amp; 2D Shapes</h2><h3>The Science</h3><p>Three main rock types: IGNEOUS (from lava), SEDIMENTARY (from layered sand), METAMORPHIC (changed by heat &amp; pressure). Crystals grow in geometric shapes — salt is CUBE-shaped; quartz is HEXAGONAL.</p><h3>The Math Skill: Classify 2D Shapes</h3><p>Every shape has attributes: number of sides, right angles, parallel sides.</p><p><strong>Quadrilaterals:</strong> square (4 equal sides + 4 right angles), rectangle (4 right angles), rhombus (4 equal sides), trapezoid (1 pair parallel sides), parallelogram (2 pairs parallel sides).</p><h3>Try This</h3><p>Look at 5 rocks or crystals. Trace the outline of each on paper. Which are quadrilaterals? Which have right angles? Which have equal sides?</p><h3>Vocabulary</h3><ul><li><strong>Igneous, sedimentary, metamorphic</strong> — rock types</li><li><strong>Crystal</strong> — solid with a geometric shape</li><li><strong>Quadrilateral</strong> — 4-sided shape</li></ul>",
};

let currentUnit = null;

function resourceCardHTML(unit) {
  const phetBtn = unit.phetUrl ? `<a class="btn-phet" href="${unit.phetUrl}" target="_blank">🧪 PhET Simulation</a>` : '';
  const ytBtn = `<a class="btn-yt" href="https://www.youtube.com/results?search_query=${encodeURIComponent(unit.ytSearch)}" target="_blank">▶️ YouTube</a>`;
  const ixlBtn = unit.ixlUrl ? `<a class="btn-ixl" href="${unit.ixlUrl}" target="_blank" rel="noopener">📚 IXL Practice</a>` : '';
  return `<div class="resource-card"><h3>📚 Resources</h3><div class="resource-btns">${phetBtn}${ixlBtn}${ytBtn}</div></div>`;
}


function showScienceConnection() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('science-screen').classList.add('active');
  const content = SCIENCE_CONNECTIONS[currentUnit] || '<p>No science connection available for this unit yet.</p>';
  document.getElementById('science-content').innerHTML = content;
}

function renderHome() {
  const grid = document.getElementById('units-grid');
  grid.innerHTML = '';
  UNITS.forEach(unit => {
    const card = document.createElement('div');
    card.className = 'unit-card';
    card.onclick = () => showLesson(unit.id);
    card.innerHTML = `
      <div class="unit-card-header">
        <div class="unit-card-icon">${unit.icon}</div>
        <div class="unit-card-meta">
          <div class="unit-card-title">${unit.title}${completedUnits[unit.id]?' ✅':''}</div>
          <div class="unit-card-cc">${unit.cc}</div>
        </div>
      </div>
      <div class="unit-card-desc">${unit.desc}</div>
      <div class="unit-card-pills">
        <div class="pill">📖 Lesson</div>
        <div class="pill">📋 Worksheet</div>
        <div class="pill">▶️ YouTube</div>
      </div>`;
    grid.appendChild(card);
  });
}

function renderSidebar() {
  const sidebar = document.getElementById('sidebar-content');
  sidebar.innerHTML = '';
  UNITS.forEach((unit, idx) => {
    const item = document.createElement('div');
    item.className = 'sidebar-item' + (currentUnit === unit.id ? ' active' : '');
    item.textContent = `${idx + 1}. ${unit.title}${completedUnits[unit.id]?' ✅':''}`;
    item.onclick = () => showLesson(unit.id);
    sidebar.appendChild(item);
  });
}

function setTopbar() {
  document.getElementById('topbar-title').textContent = currentUnit ? UNITS.find(u => u.id === currentUnit).title : 'Exploring the World with Math';
}

function showHome() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('home-screen').classList.add('active');
  currentUnit = null;
  renderHome();
  renderSidebar();
  setTopbar();
}

function showLesson(unitId) {
  currentUnit = unitId;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('lesson-screen').classList.add('active');
  const unit = UNITS.find(u => u.id === unitId);
  document.getElementById('lesson-content').innerHTML = LESSONS[unitId] + resourceCardHTML(unit);
  renderSidebar();
  setTopbar();
}

function showWorksheet() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('worksheet-screen').classList.add('active');
  const ws = WORKSHEETS[currentUnit];
  let html = '';
  ws.forEach((p, idx) => {
    html += `<div class="problem"><h4>Problem ${idx + 1}</h4><p>${p.q}</p><textarea id="ans-${idx}" placeholder="Your answer..."></textarea></div>`;
  });
  document.getElementById('worksheet-content').innerHTML = html;
}

function checkWorksheet() {
  const ws = WORKSHEETS[currentUnit];
  let html = '';
  ws.forEach((p, idx) => {
    const userAns = document.getElementById(`ans-${idx}`).value;
    html += `<div class="problem"><h4>Problem ${idx + 1}</h4><p>${p.q}</p><div class="answer-key"><strong>Answer:</strong> ${p.answer}</div><p><strong>Your answer:</strong> ${userAns || '(no answer)'}</p></div>`;
  });
  document.getElementById('worksheet-content').innerHTML = html;
}

function showQuiz() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('quiz-screen').classList.add('active');
  const quiz = QUIZZES[currentUnit];
  let html = `
    <div style="background:#f0f4ff;padding:14px;border-radius:8px;margin-bottom:15px;border-left:4px solid #1B3A8A;">
      <label style="display:block;font-weight:600;color:#1B3A8A;margin-bottom:6px;">Student Name:</label>
      <input type="text" id="student-name" placeholder="Type your full name"
        style="width:100%;padding:8px;border:1px solid #ccc;border-radius:4px;font-size:14px;" />
    </div>
  `;
  quiz.forEach((q, idx) => {
    html += `<div class="quiz-question"><h4>Question ${idx + 1}</h4><p>${q.q}</p>`;
    q.opts.forEach((opt, optIdx) => {
      html += `<label><input type="radio" name="q${idx}" value="${optIdx}"> ${opt}</label>`;
    });
    html += `</div>`;
  });
  document.getElementById('quiz-content').innerHTML = html;
}

// Quiz results stored at latest submission so email button can use them.
let lastQuizResults = null;

function submitQuiz() {
  const quiz = QUIZZES[currentUnit];
  const studentName = (document.getElementById('student-name')?.value || '').trim();
  let score = 0;
  const breakdown = [];
  quiz.forEach((q, idx) => {
    const selected = document.querySelector(`input[name="q${idx}"]:checked`);
    const selectedIdx = selected ? parseInt(selected.value) : -1;
    const isCorrect = selectedIdx === q.ans;
    if (isCorrect) score++;
    breakdown.push({
      n: idx + 1,
      question: q.q,
      studentAnswer: selectedIdx >= 0 ? q.opts[selectedIdx] : '(no answer)',
      correctAnswer: q.opts[q.ans],
      correct: isCorrect
    });
  });
  const percent = Math.round((score / quiz.length) * 100);
  completedUnits[currentUnit] = true;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('certificate-screen').classList.add('active');

  const unitObj = UNITS.find(u => u.id === currentUnit);
  const unitTitle = unitObj ? unitObj.title : currentUnit;

  lastQuizResults = { studentName, unitTitle, score, total: quiz.length, pct: percent, breakdown };

  const nameLine = studentName
    ? `<p><strong>Student:</strong> ${studentName}</p>`
    : `<p style="color:#b91c1c;"><em>Tip: type your name on the quiz screen before submitting so Mrs. Won knows who you are.</em></p>`;

  document.getElementById('cert-content').innerHTML = `
    <div style="padding: 20px;">
      ${nameLine}
      <p><strong>Unit:</strong> ${unitTitle}</p>
      <p style="font-size: 24px; margin: 20px 0;">Quiz Score: ${score}/${quiz.length} (${percent}%)</p>
      <p>${percent === 100 ? "Perfect! 🌟" : percent >= 67 ? "Nice work! Keep practicing." : "Good try! Review the lesson and try again."}</p>
      <div style="margin-top:18px;">
        <button class="btn" onclick="emailResults()" style="background:#1B3A8A;color:white;padding:10px 18px;font-size:14px;border:none;border-radius:6px;cursor:pointer;">
          📧 Submit Quiz to Mrs. Won
        </button>
      </div>
      <p style="margin-top:10px;font-size:12px;color:#666;">
        Tapping the button opens Gmail with the score and answers filled in. Just press Send.
      </p>
    </div>
  `;
  renderSidebar();
  updateProgress();
}

function emailResults() {
  if (!lastQuizResults) return;
  const r = lastQuizResults;
  const lines = [];
  lines.push(`Aloha Mrs. Won,`);
  lines.push(``);
  lines.push(`A 3rd-grade integrated science &amp; math quiz was just submitted.`);
  lines.push(``);
  lines.push(`Student: ${r.studentName || '(name not provided)'}`);
  lines.push(`Unit: ${r.unitTitle}`);
  lines.push(`Score: ${r.score} out of ${r.total} (${r.pct}%)`);
  lines.push(``);
  lines.push(`--- Detailed Answers ---`);
  r.breakdown.forEach(b => {
    lines.push(``);
    lines.push(`Q${b.n}. ${b.question}`);
    lines.push(`   Student's answer: ${b.studentAnswer}`);
    lines.push(`   Correct answer:   ${b.correctAnswer}`);
    lines.push(`   ${b.correct ? '✓ Correct' : '✗ Incorrect'}`);
  });
  lines.push(``);
  lines.push(`Mahalo,`);
  lines.push(`Mary, Star of the Sea School — Grade 3 Science &amp; Math`);

  const subject = `Grade 3 Science &amp; Math Quiz Result — ${r.studentName || 'Student'} — ${r.unitTitle} — ${r.pct}%`;
  const body = lines.join('\n');
  const to = 'ewon@starofthesea.org';

  const gmailUrl = `https://mail.google.com/mail/?view=cm&fs=1&tf=1`
    + `&to=${encodeURIComponent(to)}`
    + `&su=${encodeURIComponent(subject)}`
    + `&body=${encodeURIComponent(body)}`;
  window.open(gmailUrl, '_blank');
}

function updateProgress() {
  const completed = Object.keys(completedUnits).length;
  document.getElementById('progress-text').textContent = `${completed}/${UNITS.length}`;
}

function showHandout() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('handout-screen').classList.add('active');
  const h = HANDOUTS_5[currentUnit];
  if (!h) {
    document.getElementById('handout-content').innerHTML = '<p>No handout available for this unit.</p>';
    return;
  }
  const stepsHtml = h.steps.map(s => `<li>${s}</li>`).join('');
  const reflectHtml = h.reflect.map((r,i) => `<li>${r}</li>`).join('');
  const akFile = ANSWER_KEYS_5[currentUnit];
  const answerKeyHtml = akFile ? `
      <div style="background:#E8F5E9;border:2px solid #2E7D32;border-radius:8px;padding:14px;margin:14px 0;">
        <strong style="color:#1B3A8A;">📗 Answer Key (for self-check):</strong>
        <a href="answerkeys/${akFile}" download style="display:inline-block;background:#2E7D32;color:#fff;padding:8px 16px;border-radius:6px;text-decoration:none;font-weight:600;margin:6px 8px 6px 0;">Download ${akFile}</a>
        <div style="font-size:0.9rem;color:#555;margin-top:6px;">Completed workbook with all formulas, charts, and real-world data. Open in Excel or upload to Google Sheets (<em>File → Import → Upload</em>) to compare with your own work after you finish.</div>
      </div>` : '';
  document.getElementById('handout-content').innerHTML = `
    <div class="handout-card">
      <h3>${h.title}</h3>
      <div class="handout-science">${h.science}</div>
      <div class="handout-mission">${h.mission}</div>
      <p><strong>📋 Step-by-Step Instructions</strong></p>
      <ol class="handout-steps">${stepsHtml}</ol>
      <div class="handout-deliverable">
        <strong>🎯 What to Submit:</strong>
        ${h.deliverable}
      </div>
      ${answerKeyHtml}
      <div class="handout-reflect">
        <strong>💭 Reflection Questions:</strong>
        <ol>${reflectHtml}</ol>
      </div>
    </div>`;
}

document.addEventListener('DOMContentLoaded', () => {
  renderHome();
  renderSidebar();
});
